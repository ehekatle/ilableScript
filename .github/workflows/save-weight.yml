name: Save Weight Data

on:
  repository_dispatch:
    types: [save-weight]
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        type: string
      data:
        description: 'User data JSON'
        required: true
        type: string

jobs:
  save-user-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Save user data
        run: |
          # 获取输入数据
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            USERNAME='${{ toJSON(github.event.client_payload.username) }}'
            DATA='${{ toJSON(github.event.client_payload.data) }}'
          else
            USERNAME='${{ github.event.inputs.username }}'
            DATA='${{ github.event.inputs.data }}'
          fi
          
          # 移除引号
          USERNAME=$(echo "$USERNAME" | sed 's/^"//;s/"$//')
          
          # 创建用户数据目录
          mkdir -p docs/data/users
          
          # 保存用户数据
          echo "$DATA" > "docs/data/users/${USERNAME}.json"
          
          # 格式化JSON
          if command -v jq &> /dev/null; then
            jq '.' "docs/data/users/${USERNAME}.json" > /tmp/formatted.json
            mv /tmp/formatted.json "docs/data/users/${USERNAME}.json"
          fi
      
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add docs/data/users/
          
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📊 更新用户数据 - $(date +'%Y-%m-%d')"
            git push
          fi

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体重日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card-bg: white;
            --text: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;
            --border: #f1f5f9;
            --input-bg: #f1f5f9;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --dark: #0f172a;
            --radius-lg: 28px;
            --radius-md: 24px;
            --radius-sm: 40px;
            --shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            color: var(--text);
        }

        #app {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        /* 登录/注册页 */
        .auth-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-title {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--dark);
        }

        .auth-subtitle {
            color: var(--text-light);
            font-size: 15px;
            margin: 8px 0 30px;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: var(--input-bg);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
        }

        .auth-tab.active {
            background: var(--dark);
            color: white;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            border: none;
            background: var(--input-bg);
            border-radius: var(--radius-md);
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
        }

        .auth-input:focus {
            background: #e6edf5;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 500;
            margin-top: 8px;
            cursor: pointer;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .auth-error {
            color: var(--danger);
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }

        /* BMI滑块 */
        .bmi-slider-container {
            margin: 20px 0;
        }

        .bmi-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .bmi-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }

        .bmi-range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-lighter);
            margin-top: 6px;
        }

        .target-weight-preview {
            background: #f0f9ff;
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            text-align: center;
        }

        .target-weight-preview .label {
            font-size: 13px;
            color: #0369a1;
        }

        .target-weight-preview .value {
            font-size: 28px;
            font-weight: 600;
            color: #0284c7;
        }

        /* 主界面头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .user-stats {
            font-size: 12px;
            color: var(--text-light);
        }

        .menu-btn {
            background: none;
            border: 1px solid var(--border);
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            font-size: 20px;
            cursor: pointer;
        }

        .menu-btn:hover {
            background: var(--input-bg);
        }

        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            width: 160px;
            z-index: 100;
            display: none;
        }

        .dropdown-menu.show {
            display: block;
        }

        .menu-item {
            padding: 14px 18px;
            font-size: 14px;
            color: var(--text);
            cursor: pointer;
        }

        .menu-item:hover {
            background: var(--bg);
        }

        .menu-item:first-child { border-radius: 16px 16px 0 0; }
        .menu-item:last-child { border-radius: 0 0 16px 16px; }
        .menu-item.danger { color: var(--danger); }

        /* 目标卡片 */
        .target-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: var(--radius-md);
            padding: 20px;
            color: white;
            margin-bottom: 16px;
        }

        .target-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .target-title {
            font-size: 14px;
            opacity: 0.9;
        }

        .target-value {
            font-size: 36px;
            font-weight: 700;
        }

        .target-unit {
            font-size: 14px;
            opacity: 0.8;
            margin-left: 4px;
        }

        .progress-section {
            margin-top: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }

        .target-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* 录入区域 - 纯输入框 */
        .input-section {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .weight-input {
            width: 100%;
            padding: 20px;
            border: none;
            background: var(--input-bg);
            border-radius: var(--radius-md);
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            outline: none;
            font-family: inherit;
        }

        .weight-input:focus {
            background: #e6edf5;
        }

        .weight-input::placeholder {
            color: var(--text-lighter);
            font-size: 20px;
            font-weight: 400;
        }

        /* 移除默认的数字输入框箭头 */
        .weight-input::-webkit-outer-spin-button,
        .weight-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .weight-input[type=number] {
            -moz-appearance: textfield;
        }

        .entry-count {
            font-size: 13px;
            color: var(--text-light);
            text-align: center;
            margin-top: 12px;
        }

        .entry-count span {
            color: var(--primary);
            font-weight: 500;
        }

        .sync-status {
            font-size: 11px;
            color: var(--text-lighter);
            text-align: right;
            margin-top: 8px;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn.primary { background: var(--dark); color: white; }
        .modal-btn.secondary { background: var(--input-bg); color: var(--text); }
        .modal-btn.danger { background: var(--danger); color: white; }

        .file-input { display: none; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==================== 常量配置 ====================
        const APP_CONFIG = {
            STORAGE_KEY: 'weight_app_current_user',
            GITHUB_REPO: 'ehekatle/fit',
            WEIGHT: { MIN: 30, MAX: 200 },
            HEIGHT: { MIN: 100, MAX: 250 },
            BMI: { MIN: 18.5, MAX: 28, DEFAULT: 22 }
        };

        // ==================== 工具函数 ====================
        const DateUtils = {
            format: date => {
                const d = date || new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            },
            monthKey: date => {
                const d = date || new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            },
            dayKey: date => String((date || new Date()).getDate()).padStart(2,'0')
        };

        const MathUtils = {
            round: num => Math.round(num * 100) / 100,
            avg: arr => arr?.length ? MathUtils.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0,
            nextTarget: prev => MathUtils.round(prev - (prev * 0.0007 + 0.13) / 2),
            weightFromBMI: (bmi, height) => MathUtils.round(bmi * Math.pow(height/100, 2))
        };

        const StorageUtils = {
            get: key => { try { return JSON.parse(localStorage.getItem(key)) } catch { return null } },
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            remove: key => localStorage.removeItem(key)
        };

        // ==================== GitHub 服务 ====================
        const GitHubService = {
            async validateToken(token) {
                try {
                    const res = await fetch('https://api.github.com/user', {
                        headers: { Authorization: `token ${token}` }
                    });
                    return res.ok;
                } catch {
                    return false;
                }
            },

            async saveUserData(username, data, token) {
                try {
                    const res = await fetch(`https://api.github.com/repos/${APP_CONFIG.GITHUB_REPO}/dispatches`, {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/vnd.github.v3+json',
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            event_type: 'save-weight',
                            client_payload: { username, data }
                        })
                    });
                    return res.ok;
                } catch {
                    return false;
                }
            },

            async loadUserData(username) {
                try {
                    const url = `https://raw.githubusercontent.com/${APP_CONFIG.GITHUB_REPO}/main/docs/data/users/${username}.json?t=${Date.now()}`;
                    const res = await fetch(url);
                    if (res.ok) {
                        return await res.json();
                    }
                } catch {}
                return null;
            }
        };

        // ==================== 主应用 ====================
        class WeightApp {
            constructor() {
                this.state = {
                    view: 'auth',
                    authMode: 'login',
                    currentUser: null,
                    userData: null,
                    showMenu: false,
                    showModal: null,
                    bmiValue: APP_CONFIG.BMI.DEFAULT,
                    errorMsg: null,
                    weightInput: '',
                    isSaving: false
                };
                this.loadFromStorage();
                this.render();
            }

            loadFromStorage() {
                const saved = StorageUtils.get(APP_CONFIG.STORAGE_KEY);
                if (saved?.username && saved?.data) {
                    this.state.currentUser = saved.username;
                    this.state.userData = saved.data;
                    this.state.view = 'main';
                    this.checkAndFillMissingData();
                }
            }

            saveToStorage() {
                StorageUtils.set(APP_CONFIG.STORAGE_KEY, {
                    username: this.state.currentUser,
                    data: this.state.userData
                });
            }

            clearLocalData() {
                StorageUtils.remove(APP_CONFIG.STORAGE_KEY);
                StorageUtils.remove('github_token');
                this.state.currentUser = null;
                this.state.userData = null;
            }

            getLastEntryDate() {
                const p = this.state.userData?.progress;
                if (!p) return null;
                const months = Object.keys(p).sort();
                if (!months.length) return null;
                const [year, month] = months[months.length-1].split('-').map(Number);
                const days = Object.keys(p[months[months.length-1]]).sort();
                if (!days.length) return null;
                return new Date(year, month-1, parseInt(days[days.length-1]));
            }

            getTargetForDate(date) {
                const key = DateUtils.monthKey(date), day = DateUtils.dayKey(date);
                return this.state.userData?.progress?.[key]?.[day]?.[0] || null;
            }

            checkAndFillMissingData() {
                if (!this.state.userData) return;
                const last = this.getLastEntryDate();
                if (!last) return;
                
                const today = new Date(), lastDate = new Date(last);
                const daysDiff = Math.floor((today - lastDate) / 86400000);

                if (daysDiff >= 4) {
                    this.clearLocalData();
                    this.state.view = 'auth';
                    this.state.showModal = { type: 'fail', message: '连续4天未记录，减肥失败' };
                    return;
                }

                if (daysDiff >= 3) {
                    const firstToday = this.getTodayFirstEntry();
                    if (firstToday) this.fillMissingDays(lastDate, today, firstToday);
                }
            }

            getTodayFirstEntry() {
                const key = DateUtils.monthKey(), day = DateUtils.dayKey();
                const dayData = this.state.userData?.progress?.[key]?.[day];
                return dayData?.length > 1 ? dayData[1] : null;
            }

            fillMissingDays(start, end, firstActual) {
                const startDate = new Date(start); startDate.setDate(startDate.getDate() + 1);
                const days = [];
                for (let d = new Date(startDate); d < end; d.setDate(d.getDate() + 1)) 
                    days.push(new Date(d));

                if (!days.length) return;

                const lastTarget = this.getTargetForDate(start) || this.state.userData.weight;
                let target = lastTarget;
                const targets = days.map(() => target = MathUtils.nextTarget(target));

                const startWeight = this.getActualForDate(start) || lastTarget;
                const step = (firstActual - startWeight) / (days.length + 1);

                days.forEach((date, i) => {
                    const key = DateUtils.monthKey(date), day = DateUtils.dayKey(date);
                    if (!this.state.userData.progress[key]) this.state.userData.progress[key] = {};
                    this.state.userData.progress[key][day] = [
                        MathUtils.round(targets[i]),
                        MathUtils.round(startWeight + step * (i + 1))
                    ];
                });
            }

            getActualForDate(date) {
                const key = DateUtils.monthKey(date), day = DateUtils.dayKey(date);
                const dayData = this.state.userData?.progress?.[key]?.[day];
                return dayData?.length > 1 ? MathUtils.avg(dayData.slice(1)) : null;
            }

            async handleLogin(username, token) {
                if (!username || !token) return this.showError('请输入用户名和Token');
                if (!await GitHubService.validateToken(token)) return this.showError('Token无效');
                
                const userData = await GitHubService.loadUserData(username);
                if (!userData) return this.showError('用户不存在');

                StorageUtils.set('github_token', token);
                this.state.currentUser = username;
                this.state.userData = userData;
                this.state.view = 'main';
                this.checkAndFillMissingData();
                this.saveToStorage();
                this.render();
            }

            async handleRegister(username, height, weight, token) {
                if (!username || !height || !weight || !token) return this.showError('请填写所有字段');
                
                username = username.trim();
                height = parseFloat(height);
                weight = MathUtils.round(parseFloat(weight));
                
                if (isNaN(height) || height < APP_CONFIG.HEIGHT.MIN || height > APP_CONFIG.HEIGHT.MAX)
                    return this.showError(`身高请输入${APP_CONFIG.HEIGHT.MIN}-${APP_CONFIG.HEIGHT.MAX}cm`);
                if (isNaN(weight) || weight < APP_CONFIG.WEIGHT.MIN || weight > APP_CONFIG.WEIGHT.MAX)
                    return this.showError(`体重请输入${APP_CONFIG.WEIGHT.MIN}-${APP_CONFIG.WEIGHT.MAX}kg`);
                if (!await GitHubService.validateToken(token)) return this.showError('Token无效');
                if (await GitHubService.loadUserData(username)) return this.showError('用户已存在');

                const goal = MathUtils.weightFromBMI(this.state.bmiValue, height);
                const key = DateUtils.monthKey(), day = DateUtils.dayKey();
                
                const userData = {
                    username, height, weight, goal,
                    progress: { [key]: { [day]: [weight] } }
                };

                const saved = await GitHubService.saveUserData(username, userData, token);
                if (!saved) return this.showError('保存失败，请检查网络');

                StorageUtils.set('github_token', token);
                this.state.currentUser = username;
                this.state.userData = userData;
                this.state.view = 'main';
                this.saveToStorage();
                this.render();
            }

            handleLogout() {
                this.clearLocalData();
                this.state.view = 'auth';
                this.render();
            }

            async saveTodayWeight(weight) {
                if (this.state.isSaving) return;
                
                const num = MathUtils.round(parseFloat(weight));
                if (isNaN(num) || num < APP_CONFIG.WEIGHT.MIN || num > APP_CONFIG.WEIGHT.MAX) {
                    this.showError(`请输入${APP_CONFIG.WEIGHT.MIN}-${APP_CONFIG.WEIGHT.MAX}之间的体重`);
                    this.state.weightInput = '';
                    this.render();
                    return;
                }

                this.state.isSaving = true;
                this.render();

                const key = DateUtils.monthKey(), day = DateUtils.dayKey();
                
                const existing = this.state.userData.progress?.[key]?.[day] || [];
                
                let target = existing[0];
                if (!target) {
                    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayTarget = this.getTargetForDate(yesterday);
                    target = yesterdayTarget ? MathUtils.nextTarget(yesterdayTarget) : this.state.userData.weight;
                }

                if (!this.state.userData.progress[key]) this.state.userData.progress[key] = {};
                this.state.userData.progress[key][day] = [
                    MathUtils.round(target),
                    ...existing.slice(1),
                    num
                ];

                const token = StorageUtils.get('github_token');
                await GitHubService.saveUserData(this.state.currentUser, this.state.userData, token);
                
                this.state.weightInput = '';
                this.state.isSaving = false;
                this.saveToStorage();
                this.render();
            }

            showError(msg) {
                this.state.errorMsg = msg;
                this.render();
                setTimeout(() => { this.state.errorMsg = null; this.render(); }, 3000);
            }

            render() {
                document.getElementById('app').innerHTML = this.state.view === 'auth' ? this.renderAuth() : this.renderMain();
                this.attachEvents();
                if (this.state.showModal) this.renderModal();
            }

            renderAuth() {
                const goal = MathUtils.weightFromBMI(this.state.bmiValue, 170);
                return `
                    <div class="auth-container">
                        <div class="auth-title">体重日记</div>
                        <div class="auth-subtitle">记录你的减肥旅程</div>
                        <div class="auth-tabs">
                            ${['login', 'register'].map(m => 
                                `<button class="auth-tab ${this.state.authMode===m?'active':''}" data-auth-mode="${m}">${m==='login'?'登录':'注册'}</button>`
                            ).join('')}
                        </div>
                        ${this.state.authMode === 'login' ? `
                            <div>
                                <input type="text" id="login-username" class="auth-input" placeholder="用户名">
                                <input type="password" id="login-token" class="auth-input" placeholder="GitHub Token">
                                <button id="login-btn" class="auth-btn">登录</button>
                            </div>
                        ` : `
                            <div>
                                <input type="text" id="reg-username" class="auth-input" placeholder="用户名">
                                <input type="number" id="reg-height" class="auth-input" placeholder="身高 (cm)" step="1" min="100" max="250">
                                <input type="number" id="reg-weight" class="auth-input" placeholder="体重 (kg)" step="0.1" min="30" max="200">
                                <div class="bmi-slider-container">
                                    <div class="bmi-label"><span>目标BMI</span><span class="bmi-value">${this.state.bmiValue.toFixed(1)}</span></div>
                                    <input type="range" id="bmi-slider" min="18.5" max="28" step="0.1" value="${this.state.bmiValue}">
                                    <div class="bmi-range-labels"><span>偏瘦</span><span>正常</span><span>偏胖</span><span>肥胖</span></div>
                                </div>
                                <div class="target-weight-preview">
                                    <div class="label">目标体重</div>
                                    <div class="value" id="target-weight-display">${goal.toFixed(2)} kg</div>
                                </div>
                                <input type="password" id="reg-token" class="auth-input" placeholder="GitHub Token">
                                <button id="register-btn" class="auth-btn">注册</button>
                            </div>
                        `}
                        ${this.state.errorMsg ? `<div class="auth-error">${this.state.errorMsg}</div>` : ''}
                    </div>
                `;
            }

            renderMain() {
                const today = new Date();
                const target = this.getTargetForDate(today) || this.state.userData.weight;
                
                const key = DateUtils.monthKey();
                const day = DateUtils.dayKey();
                const todayEntries = this.state.userData.progress?.[key]?.[day] || [];
                const entryCount = todayEntries.length > 0 ? todayEntries.length - 1 : 0;
                
                let current = this.state.userData.weight;
                outer: for (const m of Object.keys(this.state.userData.progress || {}).sort().reverse()) {
                    for (const d of Object.keys(this.state.userData.progress[m]).sort().reverse()) {
                        if (this.state.userData.progress[m][d].length > 1) {
                            current = MathUtils.avg(this.state.userData.progress[m][d].slice(1));
                            break outer;
                        }
                    }
                }
                
                const progress = ((this.state.userData.weight - current) / (this.state.userData.weight - this.state.userData.goal) * 100).toFixed(1);

                return `
                    <div>
                        <div class="header">
                            <div class="user-info">
                                <div class="user-avatar">${this.state.currentUser?.[0]?.toUpperCase() || '?'}</div>
                                <div>
                                    <div class="user-name">${this.state.currentUser}</div>
                                    <div class="user-stats">${this.state.userData.height}cm · 目标 ${this.state.userData.goal.toFixed(2)}kg</div>
                                </div>
                            </div>
                            <button class="menu-btn" id="menu-btn">⋯</button>
                            <div class="dropdown-menu ${this.state.showMenu ? 'show' : ''}" id="dropdown-menu">
                                <div class="menu-item" data-action="clear">清除数据</div>
                                <div class="menu-item" data-action="export">导出数据</div>
                                <div class="menu-item" data-action="import">导入数据</div>
                                <div class="menu-item danger" data-action="logout">退出</div>
                            </div>
                        </div>

                        <div class="target-card">
                            <div class="target-header">
                                <span class="target-title">今日目标</span>
                                <span class="target-value">${MathUtils.round(target).toFixed(2)}<span class="target-unit">kg</span></span>
                            </div>
                            <div class="progress-section">
                                <div class="progress-label"><span>进度</span><span>${progress}%</span></div>
                                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${Math.min(100,Math.max(0,progress))}%"></div></div>
                                <div class="target-stats"><span>起始 ${this.state.userData.weight.toFixed(2)}kg</span><span>目标 ${this.state.userData.goal.toFixed(2)}kg</span></div>
                            </div>
                        </div>

                        <div class="input-section">
                            <div class="section-title">今日体重</div>
                            <input type="number" id="weight-input" class="weight-input" step="any" placeholder="输入后按回车" value="${this.state.weightInput}" ${this.state.isSaving ? 'disabled' : ''} autofocus>
                            ${entryCount > 0 ? `<div class="entry-count">今日已记录 <span>${entryCount}</span> 次</div>` : ''}
                        </div>

                        <div class="sync-status">${StorageUtils.get('github_token') ? '已连接' : '未连接'}</div>
                    </div>
                `;
            }

            renderModal() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = this.state.showModal.type === 'clear' ? `
                    <div class="modal-content">
                        <div class="modal-title">清除数据</div>
                        <div class="modal-text">确定清除所有数据？</div>
                        <div class="modal-btns">
                            <button class="modal-btn secondary" id="modal-cancel">取消</button>
                            <button class="modal-btn danger" id="modal-confirm-clear">清除</button>
                        </div>
                    </div>
                ` : this.state.showModal.type === 'import' ? `
                    <div class="modal-content">
                        <div class="modal-title">导入数据</div>
                        <div class="modal-text">选择JSON文件</div>
                        <input type="file" id="import-file" class="file-input" accept=".json">
                        <div class="modal-btns">
                            <button class="modal-btn secondary" id="modal-cancel">取消</button>
                            <button class="modal-btn primary" id="modal-confirm-import">选择</button>
                        </div>
                    </div>
                ` : `
                    <div class="modal-content">
                        <div class="modal-title">减肥失败</div>
                        <div class="modal-text">${this.state.showModal.message}</div>
                        <div class="modal-btns"><button class="modal-btn primary" id="modal-ok">确定</button></div>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            attachEvents() {
                if (this.state.view === 'auth') {
                    document.querySelectorAll('.auth-tab').forEach(t => 
                        t.addEventListener('click', e => {
                            this.state.authMode = e.target.dataset.authMode;
                            this.render();
                        })
                    );

                    if (this.state.authMode === 'login') {
                        document.getElementById('login-btn')?.addEventListener('click', () => {
                            this.handleLogin(
                                document.getElementById('login-username')?.value,
                                document.getElementById('login-token')?.value
                            );
                        });
                    } else {
                        const updateGoal = () => {
                            const h = parseFloat(document.getElementById('reg-height')?.value) || 170;
                            document.getElementById('target-weight-display').textContent = 
                                MathUtils.weightFromBMI(this.state.bmiValue, h).toFixed(2) + ' kg';
                        };
                        document.getElementById('bmi-slider')?.addEventListener('input', e => {
                            this.state.bmiValue = parseFloat(e.target.value);
                            updateGoal();
                        });
                        document.getElementById('reg-height')?.addEventListener('input', updateGoal);
                        document.getElementById('register-btn')?.addEventListener('click', () => {
                            this.handleRegister(
                                document.getElementById('reg-username')?.value,
                                document.getElementById('reg-height')?.value,
                                document.getElementById('reg-weight')?.value,
                                document.getElementById('reg-token')?.value
                            );
                        });
                    }
                } else {
                    document.getElementById('menu-btn')?.addEventListener('click', e => {
                        e.stopPropagation();
                        this.state.showMenu = !this.state.showMenu;
                        this.render();
                    });
                    
                    document.addEventListener('click', () => { this.state.showMenu = false; this.render(); });

                    document.querySelectorAll('[data-action]').forEach(el => {
                        el.addEventListener('click', e => {
                            const action = e.target.dataset.action;
                            this.state.showMenu = false;
                            if (action === 'logout') this.handleLogout();
                            else if (action === 'clear') this.state.showModal = { type: 'clear' };
                            else if (action === 'export') this.exportData();
                            else if (action === 'import') this.state.showModal = { type: 'import' };
                            this.render();
                        });
                    });

                    const input = document.getElementById('weight-input');
                    if (input) {
                        input.addEventListener('input', e => this.state.weightInput = e.target.value);
                        input.addEventListener('keypress', async e => {
                            if (e.key === 'Enter' && !this.state.isSaving) {
                                e.preventDefault();
                                await this.saveTodayWeight(input.value);
                            }
                        });
                        input.focus();
                    }

                    document.getElementById('modal-cancel')?.addEventListener('click', () => {
                        document.body.removeChild(document.querySelector('.modal'));
                        this.state.showModal = null;
                    });
                    
                    document.getElementById('modal-confirm-clear')?.addEventListener('click', () => {
                        this.clearLocalData();
                        this.state.view = 'auth';
                        this.state.showModal = null;
                        document.body.removeChild(document.querySelector('.modal'));
                        this.render();
                    });
                    
                    document.getElementById('modal-confirm-import')?.addEventListener('click', () => 
                        document.getElementById('import-file')?.click()
                    );
                    
                    document.getElementById('import-file')?.addEventListener('change', e => {
                        if (e.target.files.length) this.importData(e.target.files[0]);
                        document.body.removeChild(document.querySelector('.modal'));
                        this.state.showModal = null;
                    });
                    
                    document.getElementById('modal-ok')?.addEventListener('click', () => {
                        document.body.removeChild(document.querySelector('.modal'));
                        this.state.showModal = null;
                    });
                }
            }

            exportData() {
                const blob = new Blob([JSON.stringify(this.state.userData, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${this.state.currentUser}_weight_data.json`;
                a.click();
                URL.revokeObjectURL(a.href);
                this.state.showModal = null;
                this.render();
            }

            importData(file) {
                const reader = new FileReader();
                reader.onload = async e => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.username || !data.height || !data.weight || !data.goal || !data.progress)
                            return alert('无效的数据格式');
                        
                        this.state.userData = data;
                        const token = StorageUtils.get('github_token');
                        await GitHubService.saveUserData(this.state.currentUser, this.state.userData, token);
                        this.saveToStorage();
                        this.state.showModal = null;
                        this.render();
                    } catch (err) {
                        alert('导入失败：' + err.message);
                    }
                };
                reader.readAsText(file);
            }
        }

        window.addEventListener('DOMContentLoaded', () => new WeightApp());
    </script>
</body>
</html>

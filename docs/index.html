<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体重日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card-bg: white;
            --text: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;
            --border: #f1f5f9;
            --input-bg: #f1f5f9;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --dark: #0f172a;
            --radius-lg: 28px;
            --radius-md: 24px;
            --radius-sm: 40px;
            --shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            color: var(--text);
        }

        #app {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        /* 设置页 */
        .setup-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .setup-title {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .setup-subtitle {
            color: var(--text-light);
            font-size: 15px;
            margin-bottom: 30px;
        }

        .setup-input {
            width: 100%;
            padding: 16px;
            border: none;
            background: var(--input-bg);
            border-radius: var(--radius-md);
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
        }

        .setup-input:focus {
            background: #e6edf5;
        }

        .setup-btn {
            width: 100%;
            padding: 16px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 500;
            margin-top: 8px;
            cursor: pointer;
        }

        .setup-btn:hover {
            opacity: 0.9;
        }

        .setup-error {
            color: var(--danger);
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }

        /* BMI滑块 */
        .bmi-slider-container {
            margin: 20px 0;
        }

        .bmi-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .bmi-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }

        .bmi-range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-lighter);
            margin-top: 6px;
        }

        .target-weight-preview {
            background: #f0f9ff;
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            text-align: center;
        }

        .target-weight-preview .label {
            font-size: 13px;
            color: #0369a1;
        }

        .target-weight-preview .value {
            font-size: 28px;
            font-weight: 600;
            color: #0284c7;
        }

        /* 主界面头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .user-stats {
            font-size: 12px;
            color: var(--text-light);
        }

        .menu-btn {
            background: none;
            border: 1px solid var(--border);
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            font-size: 20px;
            cursor: pointer;
        }

        .menu-btn:hover {
            background: var(--input-bg);
        }

        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            width: 160px;
            z-index: 100;
            display: none;
        }

        .dropdown-menu.show {
            display: block;
        }

        .menu-item {
            padding: 14px 18px;
            font-size: 14px;
            color: var(--text);
            cursor: pointer;
        }

        .menu-item:hover {
            background: var(--bg);
        }

        .menu-item.danger {
            color: var(--danger);
        }

        /* 目标卡片 */
        .target-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: var(--radius-md);
            padding: 20px;
            color: white;
            margin-bottom: 16px;
        }

        .target-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .target-title {
            font-size: 14px;
            opacity: 0.9;
        }

        .target-value {
            font-size: 36px;
            font-weight: 700;
        }

        .target-unit {
            font-size: 14px;
            opacity: 0.8;
            margin-left: 4px;
        }

        .progress-section {
            margin-top: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }

        .target-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* 录入区域 */
        .input-section {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .weight-input {
            width: 100%;
            padding: 20px;
            border: none;
            background: var(--input-bg);
            border-radius: var(--radius-md);
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            outline: none;
            font-family: inherit;
        }

        .weight-input:focus {
            background: #e6edf5;
        }

        .weight-input::placeholder {
            color: var(--text-lighter);
            font-size: 20px;
            font-weight: 400;
        }

        .weight-input::-webkit-outer-spin-button,
        .weight-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .weight-input[type=number] {
            -moz-appearance: textfield;
        }

        .entry-count {
            font-size: 13px;
            color: var(--text-light);
            text-align: center;
            margin-top: 12px;
        }

        .entry-count span {
            color: var(--primary);
            font-weight: 500;
        }

        /* 图表区域 */
        .chart-section {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 220px;
            padding: 10px 0 20px;
            gap: 4px;
            position: relative;
        }

        .chart-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 35px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar-container {
            width: 100%;
            height: 180px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            position: relative;
        }

        .bar-green, .bar-red {
            width: 24px;
            transition: height 0.3s;
        }

        .bar-green {
            background: var(--success);
            border-radius: 4px 4px 0 0;
        }

        .bar-red {
            background: var(--danger);
            border-radius: 4px 4px 0 0;
        }

        .chart-date {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .chart-weight {
            font-size: 10px;
            color: var(--text-lighter);
            position: absolute;
            bottom: -20px;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: var(--dark);
            color: white;
        }

        .modal-btn.secondary {
            background: var(--input-bg);
            color: var(--text);
        }

        .modal-btn.danger {
            background: var(--danger);
            color: white;
        }

        .file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // ==================== 常量配置 ====================
            const STORAGE_KEY = 'weight_app_data';
            const WEIGHT_CONFIG = {
                MIN: 30,
                MAX: 200,
                HEIGHT_MIN: 100,
                HEIGHT_MAX: 250,
                BMI_MIN: 18.5,
                BMI_MAX: 28,
                BMI_DEFAULT: 22
            };

            // ==================== 工具函数 ====================
            const DateUtils = {
                format: date => {
                    const d = date || new Date();
                    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                },
                monthKey: date => {
                    const d = date || new Date();
                    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                },
                dayKey: date => String((date || new Date()).getDate()).padStart(2,'0'),
                getLastNDays: (n = 7) => {
                    const dates = [];
                    const today = new Date();
                    for (let i = n - 1; i >= 0; i--) {
                        const d = new Date(today);
                        d.setDate(today.getDate() - i);
                        dates.push(d);
                    }
                    return dates;
                },
                display: date => `${date.getMonth()+1}/${date.getDate()}`
            };

            const MathUtils = {
                round: num => Math.round(num * 100) / 100,
                avg: arr => arr?.length ? MathUtils.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null,
                nextTarget: prev => MathUtils.round(prev - (prev * 0.0007 + 0.13) / 2),
                weightFromBMI: (bmi, height) => MathUtils.round(bmi * Math.pow(height/100, 2))
            };

            const StorageUtils = {
                load: () => {
                    try {
                        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null;
                    } catch {
                        return null;
                    }
                },
                save: data => {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                },
                clear: () => {
                    localStorage.removeItem(STORAGE_KEY);
                }
            };

            // ==================== 主应用 ====================
            class WeightApp {
                constructor() {
                    this.state = {
                        view: 'setup',
                        userData: null,
                        bmiValue: WEIGHT_CONFIG.BMI_DEFAULT,
                        errorMsg: null,
                        weightInput: '',
                        isSaving: false,
                        showMenu: false,
                        showModal: null
                    };
                    this.loadFromStorage();
                    this.render();
                }

                loadFromStorage() {
                    const data = StorageUtils.load();
                    if (data) {
                        this.state.userData = data;
                        this.state.view = 'main';
                        this.checkAndFillMissingData();
                    }
                }

                checkAndFillMissingData() {
                    if (!this.state.userData) return;
                    
                    const today = new Date();
                    const lastEntry = this.getLastEntryDate();
                    
                    if (!lastEntry) return;
                    
                    const daysDiff = Math.floor((today - lastEntry) / 86400000);

                    if (daysDiff >= 4) {
                        this.clearData();
                        this.state.view = 'setup';
                        this.state.showModal = { 
                            type: 'fail', 
                            title: '减肥失败', 
                            message: '连续4天未记录，请重新开始' 
                        };
                        return;
                    }

                    if (daysDiff >= 3) {
                        this.fillMissingDays(lastEntry, today);
                    }
                }

                getLastEntryDate() {
                    const progress = this.state.userData?.progress;
                    if (!progress) return null;
                    
                    const months = Object.keys(progress).sort();
                    if (!months.length) return null;
                    
                    const lastMonth = months[months.length - 1];
                    const days = Object.keys(progress[lastMonth]).sort();
                    if (!days.length) return null;
                    
                    const [year, month] = lastMonth.split('-').map(Number);
                    return new Date(year, month - 1, parseInt(days[days.length - 1]));
                }

                getTargetForDate(date) {
                    const monthKey = DateUtils.monthKey(date);
                    const dayKey = DateUtils.dayKey(date);
                    return this.state.userData?.progress?.[monthKey]?.[dayKey]?.[0] || null;
                }

                getActualForDate(date) {
                    const monthKey = DateUtils.monthKey(date);
                    const dayKey = DateUtils.dayKey(date);
                    const dayData = this.state.userData?.progress?.[monthKey]?.[dayKey];
                    return dayData?.length > 1 ? MathUtils.avg(dayData.slice(1)) : null;
                }

                getAllActualForDate(date) {
                    const monthKey = DateUtils.monthKey(date);
                    const dayKey = DateUtils.dayKey(date);
                    return this.state.userData?.progress?.[monthKey]?.[dayKey]?.slice(1) || [];
                }

                fillMissingDays(startDate, endDate) {
                    const start = new Date(startDate);
                    start.setDate(start.getDate() + 1);
                    
                    const days = [];
                    for (let d = new Date(start); d < endDate; d.setDate(d.getDate() + 1)) {
                        days.push(new Date(d));
                    }

                    if (!days.length) return;

                    const startActual = this.getActualForDate(startDate) || this.state.userData.weight;
                    const startTarget = this.getTargetForDate(startDate) || this.state.userData.weight;
                    
                    let firstActual = null;
                    for (let d = new Date(endDate); d >= startDate; d.setDate(d.getDate() - 1)) {
                        const actual = this.getActualForDate(d);
                        if (actual !== null) {
                            firstActual = actual;
                            break;
                        }
                    }

                    if (firstActual === null) return;

                    let target = startTarget;
                    const targets = days.map(() => target = MathUtils.nextTarget(target));
                    const step = (firstActual - startActual) / (days.length + 1);

                    days.forEach((date, i) => {
                        const monthKey = DateUtils.monthKey(date);
                        const dayKey = DateUtils.dayKey(date);
                        
                        if (!this.state.userData.progress[monthKey]) {
                            this.state.userData.progress[monthKey] = {};
                        }
                        
                        const actualWeight = MathUtils.round(startActual + step * (i + 1));
                        this.state.userData.progress[monthKey][dayKey] = [
                            MathUtils.round(targets[i]),
                            actualWeight
                        ];
                    });

                    StorageUtils.save(this.state.userData);
                }

                handleSetup(name, height, weight) {
                    if (!name || !height || !weight) {
                        this.showError('请填写所有字段');
                        return;
                    }

                    name = name.trim();
                    height = parseFloat(height);
                    weight = MathUtils.round(parseFloat(weight));

                    if (isNaN(height) || height < WEIGHT_CONFIG.HEIGHT_MIN || height > WEIGHT_CONFIG.HEIGHT_MAX) {
                        this.showError(`身高请输入${WEIGHT_CONFIG.HEIGHT_MIN}-${WEIGHT_CONFIG.HEIGHT_MAX}cm`);
                        return;
                    }

                    if (isNaN(weight) || weight < WEIGHT_CONFIG.MIN || weight > WEIGHT_CONFIG.MAX) {
                        this.showError(`体重请输入${WEIGHT_CONFIG.MIN}-${WEIGHT_CONFIG.MAX}kg`);
                        return;
                    }

                    const goal = MathUtils.weightFromBMI(this.state.bmiValue, height);
                    const today = new Date();
                    const monthKey = DateUtils.monthKey(today);
                    const dayKey = DateUtils.dayKey(today);

                    const userData = {
                        name,
                        height,
                        weight,
                        goal,
                        progress: {
                            [monthKey]: {
                                [dayKey]: [weight]
                            }
                        }
                    };

                    this.state.userData = userData;
                    this.state.view = 'main';
                    StorageUtils.save(userData);
                    this.render();
                }

                clearData() {
                    StorageUtils.clear();
                    this.state.userData = null;
                }

                handleLogout() {
                    this.state.showModal = {
                        type: 'clear',
                        title: '清除数据',
                        message: '确定要清除所有数据吗？此操作不可恢复。'
                    };
                    this.render();
                }

                confirmClear() {
                    this.clearData();
                    this.state.view = 'setup';
                    this.state.showModal = null;
                    this.state.showMenu = false;
                    this.render();
                }

                async saveTodayWeight(weight) {
                    if (this.state.isSaving) return;

                    const num = MathUtils.round(parseFloat(weight));
                    if (isNaN(num) || num < WEIGHT_CONFIG.MIN || num > WEIGHT_CONFIG.MAX) {
                        this.showError(`请输入${WEIGHT_CONFIG.MIN}-${WEIGHT_CONFIG.MAX}之间的体重`);
                        this.state.weightInput = '';
                        this.render();
                        return;
                    }

                    this.state.isSaving = true;
                    this.render();

                    const today = new Date();
                    const monthKey = DateUtils.monthKey(today);
                    const dayKey = DateUtils.dayKey(today);

                    const existing = this.state.userData.progress?.[monthKey]?.[dayKey] || [];

                    let target = existing[0];
                    if (!target) {
                        const yesterday = new Date(today);
                        yesterday.setDate(yesterday.getDate() - 1);
                        const yesterdayTarget = this.getTargetForDate(yesterday);
                        target = yesterdayTarget ? MathUtils.nextTarget(yesterdayTarget) : this.state.userData.weight;
                    }

                    if (!this.state.userData.progress[monthKey]) {
                        this.state.userData.progress[monthKey] = {};
                    }

                    this.state.userData.progress[monthKey][dayKey] = [
                        MathUtils.round(target),
                        ...existing.slice(1),
                        num
                    ];

                    StorageUtils.save(this.state.userData);
                    
                    this.state.weightInput = '';
                    this.state.isSaving = false;
                    this.render();
                }

                getChartData() {
                    const dates = DateUtils.getLastNDays(7);
                    return dates.map(date => {
                        const target = this.getTargetForDate(date);
                        const actual = this.getActualForDate(date);
                        return {
                            date,
                            display: DateUtils.display(date),
                            target,
                            actual,
                            actuals: this.getAllActualForDate(date),
                            weight: actual !== null ? actual.toFixed(2) : '--'
                        };
                    });
                }

                calculateYAxisRange() {
                    const chartData = this.getChartData();
                    const actuals = chartData.map(d => d.actual).filter(a => a !== null);
                    
                    if (actuals.length === 0) {
                        return { min: 60, max: 100 };
                    }

                    const avg = actuals.reduce((a, b) => a + b, 0) / actuals.length;
                    
                    let maxDiff = 0;
                    actuals.forEach(actual => {
                        const diff = Math.abs(actual - avg);
                        if (diff > maxDiff) maxDiff = diff;
                    });

                    const padding = maxDiff + 0.5;
                    return {
                        min: Math.max(30, Math.floor((avg - padding) * 10) / 10),
                        max: Math.min(200, Math.ceil((avg + padding) * 10) / 10)
                    };
                }

                exportData() {
                    const dataStr = JSON.stringify(this.state.userData, null, 2);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${this.state.userData.name}_weight_data.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    this.state.showModal = null;
                    this.state.showMenu = false;
                    this.render();
                }

                importData(file) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        try {
                            const data = JSON.parse(e.target.result);
                            if (!data.name || !data.height || !data.weight || !data.goal || !data.progress) {
                                alert('无效的数据格式');
                                return;
                            }
                            
                            this.state.userData = data;
                            StorageUtils.save(data);
                            this.state.view = 'main';
                            this.state.showModal = null;
                            this.state.showMenu = false;
                            this.render();
                        } catch (err) {
                            alert('导入失败：' + err.message);
                        }
                    };
                    reader.readAsText(file);
                }

                showError(msg) {
                    this.state.errorMsg = msg;
                    this.render();
                    setTimeout(() => {
                        this.state.errorMsg = null;
                        this.render();
                    }, 3000);
                }

                render() {
                    document.getElementById('app').innerHTML = this.state.view === 'setup' ? this.renderSetup() : this.renderMain();
                    this.attachEvents();
                    if (this.state.showModal) this.renderModal();
                }

                renderSetup() {
                    const goal = MathUtils.weightFromBMI(this.state.bmiValue, 170);
                    return `
                        <div class="setup-container">
                            <div class="setup-title">体重日记</div>
                            <div class="setup-subtitle">首次使用，请设置个人信息</div>
                            <div>
                                <input type="text" id="setup-name" class="setup-input" placeholder="你的名字" autocomplete="off">
                                <input type="number" id="setup-height" class="setup-input" placeholder="身高 (cm)" step="1" min="100" max="250">
                                <input type="number" id="setup-weight" class="setup-input" placeholder="当前体重 (kg)" step="0.1" min="30" max="200">
                                
                                <div class="bmi-slider-container">
                                    <div class="bmi-label">
                                        <span>目标BMI</span>
                                        <span class="bmi-value">${this.state.bmiValue.toFixed(1)}</span>
                                    </div>
                                    <input type="range" id="bmi-slider" min="18.5" max="28" step="0.1" value="${this.state.bmiValue}">
                                    <div class="bmi-range-labels">
                                        <span>偏瘦</span>
                                        <span>正常</span>
                                        <span>偏胖</span>
                                        <span>肥胖</span>
                                    </div>
                                </div>

                                <div class="target-weight-preview">
                                    <div class="label">目标体重</div>
                                    <div class="value" id="target-weight-display">${goal.toFixed(2)} kg</div>
                                </div>

                                <button id="setup-btn" class="setup-btn">开始记录</button>
                            </div>
                            ${this.state.errorMsg ? `<div class="setup-error">${this.state.errorMsg}</div>` : ''}
                        </div>
                    `;
                }

                renderMain() {
                    const today = new Date();
                    const target = this.getTargetForDate(today) || this.state.userData.weight;
                    
                    const monthKey = DateUtils.monthKey(today);
                    const dayKey = DateUtils.dayKey(today);
                    const todayEntries = this.state.userData.progress?.[monthKey]?.[dayKey] || [];
                    const entryCount = todayEntries.length > 0 ? todayEntries.length - 1 : 0;

                    let currentWeight = this.state.userData.weight;
                    const months = Object.keys(this.state.userData.progress || {}).sort().reverse();
                    outer: for (const month of months) {
                        const days = Object.keys(this.state.userData.progress[month]).sort().reverse();
                        for (const day of days) {
                            if (this.state.userData.progress[month][day].length > 1) {
                                const actuals = this.state.userData.progress[month][day].slice(1);
                                currentWeight = MathUtils.avg(actuals);
                                break outer;
                            }
                        }
                    }

                    const progress = ((this.state.userData.weight - currentWeight) / 
                                    (this.state.userData.weight - this.state.userData.goal) * 100).toFixed(1);

                    const chartData = this.getChartData();
                    const yRange = this.calculateYAxisRange();
                    const range = yRange.max - yRange.min;

                    return `
                        <div>
                            <div class="header">
                                <div class="user-info">
                                    <div class="user-avatar">${this.state.userData.name[0].toUpperCase()}</div>
                                    <div>
                                        <div class="user-name">${this.state.userData.name}</div>
                                        <div class="user-stats">${this.state.userData.height}cm · 目标 ${this.state.userData.goal.toFixed(2)}kg</div>
                                    </div>
                                </div>
                                <button class="menu-btn" id="menu-btn">⋯</button>
                                <div class="dropdown-menu ${this.state.showMenu ? 'show' : ''}" id="dropdown-menu">
                                    <div class="menu-item" data-action="clear">清除数据</div>
                                    <div class="menu-item" data-action="export">导出数据</div>
                                    <div class="menu-item" data-action="import">导入数据</div>
                                </div>
                            </div>

                            <div class="target-card">
                                <div class="target-header">
                                    <span class="target-title">今日目标</span>
                                    <span class="target-value">${MathUtils.round(target).toFixed(2)}<span class="target-unit">kg</span></span>
                                </div>
                                <div class="progress-section">
                                    <div class="progress-label">
                                        <span>进度</span>
                                        <span>${progress}%</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" style="width: ${Math.min(100, Math.max(0, progress))}%"></div>
                                    </div>
                                    <div class="target-stats">
                                        <span>起始 ${this.state.userData.weight.toFixed(2)}kg</span>
                                        <span>目标 ${this.state.userData.goal.toFixed(2)}kg</span>
                                    </div>
                                </div>
                            </div>

                            <div class="input-section">
                                <div class="section-title">今日体重</div>
                                <input type="number" id="weight-input" class="weight-input" step="any" 
                                       placeholder="输入后按回车" value="${this.state.weightInput}" 
                                       ${this.state.isSaving ? 'disabled' : ''} autofocus>
                                ${entryCount > 0 ? 
                                    `<div class="entry-count">今日已记录 <span>${entryCount}</span> 次</div>` : ''}
                            </div>

                            <div class="chart-section">
                                <div class="chart-title">最近7天体重</div>
                                <div class="chart-container">
                                    ${chartData.map(item => {
                                        const target = item.target || 0;
                                        const actual = item.actual;
                                        const greenHeight = actual !== null ? 
                                            Math.min(actual, target) : 0;
                                        const redHeight = actual !== null && actual > target ? 
                                            actual - target : 0;
                                        
                                        const totalHeight = actual !== null ? actual : 0;
                                        const greenPercent = ((greenHeight - yRange.min) / range) * 180;
                                        const redPercent = (redHeight / range) * 180;
                                        
                                        return `
                                            <div class="chart-column">
                                                <div class="bar-container">
                                                    ${actual !== null ? `
                                                        ${redHeight > 0 ? 
                                                            `<div class="bar-red" style="height: ${Math.max(0, redPercent)}px;"></div>` : ''}
                                                        ${greenHeight > 0 ? 
                                                            `<div class="bar-green" style="height: ${Math.max(0, greenPercent)}px;"></div>` : ''}
                                                    ` : ''}
                                                </div>
                                                <div class="chart-date">${item.display}</div>
                                                <div class="chart-weight">${item.weight}</div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                }

                renderModal() {
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    
                    let content = '';
                    if (this.state.showModal.type === 'clear') {
                        content = `
                            <div class="modal-content">
                                <div class="modal-title">${this.state.showModal.title}</div>
                                <div class="modal-text">${this.state.showModal.message}</div>
                                <div class="modal-btns">
                                    <button class="modal-btn secondary" id="modal-cancel">取消</button>
                                    <button class="modal-btn danger" id="modal-confirm">清除</button>
                                </div>
                            </div>
                        `;
                    } else if (this.state.showModal.type === 'import') {
                        content = `
                            <div class="modal-content">
                                <div class="modal-title">导入数据</div>
                                <div class="modal-text">选择JSON文件导入</div>
                                <input type="file" id="import-file" class="file-input" accept=".json">
                                <div class="modal-btns">
                                    <button class="modal-btn secondary" id="modal-cancel">取消</button>
                                    <button class="modal-btn primary" id="modal-confirm-import">选择文件</button>
                                </div>
                            </div>
                        `;
                    } else if (this.state.showModal.type === 'fail') {
                        content = `
                            <div class="modal-content">
                                <div class="modal-title">${this.state.showModal.title}</div>
                                <div class="modal-text">${this.state.showModal.message}</div>
                                <div class="modal-btns">
                                    <button class="modal-btn primary" id="modal-ok">确定</button>
                                </div>
                            </div>
                        `;
                    }

                    modal.innerHTML = content;
                    document.body.appendChild(modal);
                }

                attachEvents() {
                    if (this.state.view === 'setup') {
                        const updateGoal = () => {
                            const height = parseFloat(document.getElementById('setup-height')?.value) || 170;
                            document.getElementById('target-weight-display').textContent = 
                                MathUtils.weightFromBMI(this.state.bmiValue, height).toFixed(2) + ' kg';
                        };

                        document.getElementById('bmi-slider')?.addEventListener('input', e => {
                            this.state.bmiValue = parseFloat(e.target.value);
                            updateGoal();
                        });

                        document.getElementById('setup-height')?.addEventListener('input', updateGoal);

                        document.getElementById('setup-btn')?.addEventListener('click', () => {
                            this.handleSetup(
                                document.getElementById('setup-name')?.value,
                                document.getElementById('setup-height')?.value,
                                document.getElementById('setup-weight')?.value
                            );
                        });
                    } else {
                        document.getElementById('menu-btn')?.addEventListener('click', e => {
                            e.stopPropagation();
                            this.state.showMenu = !this.state.showMenu;
                            this.render();
                        });

                        document.addEventListener('click', () => {
                            if (this.state.showMenu) {
                                this.state.showMenu = false;
                                this.render();
                            }
                        });

                        document.querySelectorAll('[data-action]').forEach(el => {
                            el.addEventListener('click', e => {
                                const action = e.target.dataset.action;
                                this.state.showMenu = false;
                                if (action === 'clear') {
                                    this.handleLogout();
                                } else if (action === 'export') {
                                    this.exportData();
                                } else if (action === 'import') {
                                    this.state.showModal = { type: 'import' };
                                    this.render();
                                }
                            });
                        });

                        const input = document.getElementById('weight-input');
                        if (input) {
                            input.addEventListener('input', e => this.state.weightInput = e.target.value);
                            input.addEventListener('keypress', async e => {
                                if (e.key === 'Enter' && !this.state.isSaving) {
                                    e.preventDefault();
                                    await this.saveTodayWeight(input.value);
                                }
                            });
                            input.focus();
                        }

                        document.getElementById('modal-cancel')?.addEventListener('click', () => {
                            document.body.removeChild(document.querySelector('.modal'));
                            this.state.showModal = null;
                        });

                        document.getElementById('modal-confirm')?.addEventListener('click', () => {
                            this.confirmClear();
                            document.body.removeChild(document.querySelector('.modal'));
                        });

                        document.getElementById('modal-confirm-import')?.addEventListener('click', () => {
                            document.getElementById('import-file').click();
                        });

                        document.getElementById('import-file')?.addEventListener('change', e => {
                            if (e.target.files.length) {
                                this.importData(e.target.files[0]);
                                document.body.removeChild(document.querySelector('.modal'));
                            }
                        });

                        document.getElementById('modal-ok')?.addEventListener('click', () => {
                            document.body.removeChild(document.querySelector('.modal'));
                            this.state.showModal = null;
                        });
                    }
                }
            }

            window.addEventListener('DOMContentLoaded', () => new WeightApp());
        })();
    </script>
</body>
</html>

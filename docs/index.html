<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体重日记</title>
    <!-- 使用本地或可靠的CDN -->
    <script src="js/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
            color: #1e293b;
        }

        #app {
            max-width: 400px;
            width: 100%;
        }

        /* 卡片设计 */
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            margin-bottom: 16px;
            border: 1px solid #f1f5f9;
        }

        /* 登录/注册页 */
        .auth-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-title {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #0f172a;
        }

        .auth-subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: #0f172a;
            color: white;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            border: none;
            background: #f1f5f9;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .auth-input:focus {
            background: #e6edf5;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            margin-top: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .auth-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }

        /* BMI滑块 */
        .bmi-slider-container {
            margin: 20px 0;
        }

        .bmi-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .bmi-value {
            font-size: 24px;
            font-weight: 600;
            color: #3b82f6;
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .bmi-range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }

        .target-weight-preview {
            background: #f0f9ff;
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            text-align: center;
        }

        .target-weight-preview .label {
            font-size: 13px;
            color: #0369a1;
        }

        .target-weight-preview .value {
            font-size: 28px;
            font-weight: 600;
            color: #0284c7;
        }

        /* 主界面头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-details {
            line-height: 1.3;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .user-stats {
            font-size: 12px;
            color: #64748b;
        }

        .menu-btn {
            background: none;
            border: 1px solid #e2e8f0;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #f1f5f9;
        }

        /* 下拉菜单 */
        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #f1f5f9;
            width: 160px;
            z-index: 100;
            display: none;
        }

        .dropdown-menu.show {
            display: block;
        }

        .menu-item {
            padding: 14px 18px;
            font-size: 14px;
            color: #1e293b;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: #f8fafc;
        }

        .menu-item:first-child {
            border-radius: 16px 16px 0 0;
        }

        .menu-item:last-child {
            border-radius: 0 0 16px 16px;
        }

        .menu-item.danger {
            color: #ef4444;
        }

        /* 目标卡片 */
        .target-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 20px;
            color: white;
            margin-bottom: 16px;
        }

        .target-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .target-title {
            font-size: 14px;
            opacity: 0.9;
        }

        .target-value {
            font-size: 36px;
            font-weight: 700;
        }

        .target-unit {
            font-size: 14px;
            opacity: 0.8;
            margin-left: 4px;
        }

        .progress-section {
            margin-top: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }

        .target-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* 录入区域 */
        .input-section {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #f1f5f9;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .weight-input {
            flex: 1;
            padding: 16px;
            border: none;
            background: #f1f5f9;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .add-btn {
            width: 60px;
            height: 60px;
            border: none;
            background: #0f172a;
            color: white;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 400;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        .entries-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .entry-tag {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remove-entry {
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
        }

        .remove-entry:hover {
            color: #ef4444;
        }

        .average-info {
            font-size: 14px;
            color: #64748b;
            padding: 12px 0;
            border-top: 1px dashed #e2e8f0;
            border-bottom: 1px dashed #e2e8f0;
            margin-bottom: 16px;
        }

        .average-info strong {
            color: #0f172a;
            font-size: 20px;
            margin-left: 6px;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #2563eb;
        }

        .save-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* 图表区域 */
        .chart-section {
            background: white;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f1f5f9;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chart-legend {
            display: flex;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #64748b;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
        }

        .dot-red {
            background: #ef4444;
        }

        .dot-green {
            background: #10b981;
        }

        .nav-btn {
            background: none;
            border: 1px solid #e2e8f0;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #f1f5f9;
        }

        .chart-container {
            position: relative;
            height: 220px;
            width: 100%;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-text {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: #0f172a;
            color: white;
        }

        .modal-btn.secondary {
            background: #f1f5f9;
            color: #1e293b;
        }

        .modal-btn.danger {
            background: #ef4444;
            color: white;
        }

        .file-input {
            display: none;
        }

        .sync-status {
            font-size: 11px;
            color: #94a3b8;
            text-align: right;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // 常量定义
            const APP = {
                STORAGE_KEY: 'weight_app_current_user',
                GITHUB_REPO: 'ehekatle/fit', // 请修改为你的仓库
                SYNC_STATUS_KEY: 'last_sync_time',
                BMI_MIN: 18.5,
                BMI_MAX: 28,
                BMI_DEFAULT: 22
            };

            // 工具函数
            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function getMonthKey(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                return `${y}-${m}`;
            }

            function getDayKey(date) {
                return String(date.getDate()).padStart(2, '0');
            }

            function parseMonthKey(monthKey) {
                const [y, m] = monthKey.split('-');
                return { year: parseInt(y), month: parseInt(m) };
            }

            // 计算目标体重公式
            function calculateNextTarget(prevTarget) {
                return prevTarget - (prevTarget * 0.0007 + 0.13) / 2;
            }

            // 根据BMI计算目标体重
            function calculateWeightFromBMI(bmi, height) {
                const heightInM = height / 100;
                return Math.round(bmi * heightInM * heightInM * 100) / 100;
            }

            // GitHub 同步类
            class GitHubSync {
                constructor(repo) {
                    this.repo = repo;
                }

                async validateToken(token) {
                    try {
                        const response = await fetch('https://api.github.com/user', {
                            headers: {
                                'Authorization': `token ${token}`
                            }
                        });
                        return response.ok;
                    } catch {
                        return false;
                    }
                }

                async saveUserData(username, data, token) {
                    try {
                        const response = await fetch(`https://api.github.com/repos/${this.repo}/dispatches`, {
                            method: 'POST',
                            headers: {
                                'Accept': 'application/vnd.github.v3+json',
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                event_type: 'save-weight',
                                client_payload: {
                                    username: username,
                                    data: data
                                }
                            })
                        });
                        
                        if (response.ok) {
                            localStorage.setItem(APP.SYNC_STATUS_KEY, new Date().toISOString());
                            this.backupToLocal(username, data);
                            return true;
                        }
                        return false;
                    } catch (error) {
                        console.error('保存失败:', error);
                        this.backupToLocal(username, data);
                        return false;
                    }
                }

                async loadUserData(username) {
                    try {
                        const response = await fetch(`https://raw.githubusercontent.com/${this.repo}/main/docs/data/users/${username}.json?t=${Date.now()}`);
                        if (response.ok) {
                            const data = await response.json();
                            this.backupToLocal(username, data);
                            return data;
                        }
                    } catch (e) {
                        console.log('从GitHub加载失败，尝试从本地缓存加载');
                    }
                    
                    const localData = localStorage.getItem(`user_${username}_backup`);
                    if (localData) {
                        try {
                            return JSON.parse(localData);
                        } catch (e) {
                            console.log('本地缓存解析失败');
                        }
                    }
                    
                    return null;
                }

                backupToLocal(username, data) {
                    localStorage.setItem(`user_${username}_backup`, JSON.stringify(data));
                }
            }

            // 主应用
            class WeightApp {
                constructor() {
                    this.view = 'auth';
                    this.authMode = 'login';
                    this.currentUser = null;
                    this.userData = null;
                    this.todayEntries = [];
                    this.sync = new GitHubSync(APP.GITHUB_REPO);
                    this.chart = null;
                    this.chartStartIndex = 0;
                    this.showMenu = false;
                    this.showModal = null;
                    this.bmiValue = APP.BMI_DEFAULT;
                    this.errorMsg = null;
                    
                    this.init();
                }

                init() {
                    const saved = localStorage.getItem(APP.STORAGE_KEY);
                    if (saved) {
                        try {
                            const { username, data } = JSON.parse(saved);
                            this.currentUser = username;
                            this.userData = data;
                            this.view = 'main';
                            this.checkAndFillMissingData();
                            this.prepareTodayEntries();
                        } catch (e) {
                            console.log('恢复登录状态失败');
                        }
                    }
                    this.render();
                }

                checkAndFillMissingData() {
                    if (!this.userData) return;

                    const today = new Date();
                    
                    const lastEntryDate = this.getLastEntryDate();
                    if (!lastEntryDate) return;

                    const lastDate = new Date(lastEntryDate);
                    const daysDiff = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));

                    if (daysDiff >= 4) {
                        this.userData = null;
                        this.currentUser = null;
                        localStorage.removeItem(APP.STORAGE_KEY);
                        this.view = 'auth';
                        this.showModal = {
                            type: 'fail',
                            message: '由于连续4天未记录体重，本次减肥目标失败。请重新开始！'
                        };
                        return;
                    }

                    if (daysDiff >= 3) {
                        const firstEntryToday = this.getTodayFirstEntry();
                        if (firstEntryToday) {
                            this.fillMissingDays(lastDate, today, firstEntryToday);
                        }
                    }
                }

                getLastEntryDate() {
                    if (!this.userData?.progress) return null;
                    
                    const months = Object.keys(this.userData.progress).sort();
                    if (months.length === 0) return null;

                    const lastMonth = months[months.length - 1];
                    const days = Object.keys(this.userData.progress[lastMonth]).sort();
                    if (days.length === 0) return null;

                    const lastDay = days[days.length - 1];
                    const { year, month } = parseMonthKey(lastMonth);
                    return new Date(year, month - 1, parseInt(lastDay));
                }

                getTodayFirstEntry() {
                    const today = new Date();
                    const monthKey = getMonthKey(today);
                    const dayKey = getDayKey(today);
                    
                    const dayData = this.userData?.progress?.[monthKey]?.[dayKey];
                    if (dayData && dayData.length > 1) {
                        return dayData[1];
                    }
                    return null;
                }

                fillMissingDays(startDate, endDate, firstActual) {
                    const start = new Date(startDate);
                    start.setDate(start.getDate() + 1);
                    
                    const days = [];
                    let current = new Date(start);
                    while (current < endDate) {
                        days.push(new Date(current));
                        current.setDate(current.getDate() + 1);
                    }

                    if (days.length === 0) return;

                    const lastTarget = this.getTargetForDate(startDate);
                    
                    const targets = [];
                    let target = lastTarget;
                    for (let i = 0; i < days.length; i++) {
                        target = calculateNextTarget(target);
                        targets.push(target);
                    }

                    const startWeight = this.getActualForDate(startDate) || lastTarget;
                    const step = (firstActual - startWeight) / (days.length + 1);

                    days.forEach((date, index) => {
                        const monthKey = getMonthKey(date);
                        const dayKey = getDayKey(date);
                        
                        if (!this.userData.progress[monthKey]) {
                            this.userData.progress[monthKey] = {};
                        }
                        
                        const actualWeight = startWeight + step * (index + 1);
                        this.userData.progress[monthKey][dayKey] = [
                            Math.round(targets[index] * 100) / 100,
                            Math.round(actualWeight * 100) / 100
                        ];
                    });
                }

                getTargetForDate(date) {
                    const monthKey = getMonthKey(date);
                    const dayKey = getDayKey(date);
                    
                    return this.userData?.progress?.[monthKey]?.[dayKey]?.[0] || null;
                }

                getActualForDate(date) {
                    const monthKey = getMonthKey(date);
                    const dayKey = getDayKey(date);
                    
                    const dayData = this.userData?.progress?.[monthKey]?.[dayKey];
                    if (!dayData || dayData.length < 2) return null;
                    
                    const actuals = dayData.slice(1);
                    return actuals.reduce((a, b) => a + b, 0) / actuals.length;
                }

                prepareTodayEntries() {
                    const today = new Date();
                    const monthKey = getMonthKey(today);
                    const dayKey = getDayKey(today);
                    
                    const dayData = this.userData?.progress?.[monthKey]?.[dayKey];
                    if (dayData && dayData.length > 1) {
                        this.todayEntries = dayData.slice(1);
                    } else {
                        this.todayEntries = [];
                    }
                }

                async handleLogin(username, token) {
                    if (!username || !token) {
                        this.showError('请输入用户名和Token');
                        return;
                    }

                    const isValid = await this.sync.validateToken(token);
                    if (!isValid) {
                        this.showError('Token无效');
                        return;
                    }

                    const userData = await this.sync.loadUserData(username);
                    if (!userData) {
                        this.showError('用户不存在');
                        return;
                    }

                    localStorage.setItem('github_token', token);
                    
                    this.currentUser = username;
                    this.userData = userData;
                    this.view = 'main';
                    
                    this.checkAndFillMissingData();
                    this.prepareTodayEntries();
                    
                    localStorage.setItem(APP.STORAGE_KEY, JSON.stringify({
                        username: this.currentUser,
                        data: this.userData
                    }));
                    
                    this.render();
                }

                async handleRegister(username, height, weight, token) {
                    if (!username || !height || !weight || !token) {
                        this.showError('请填写所有字段');
                        return;
                    }

                    height = parseFloat(height);
                    weight = parseFloat(weight);
                    
                    if (isNaN(height) || height < 100 || height > 250) {
                        this.showError('身高请输入100-250cm');
                        return;
                    }
                    
                    if (isNaN(weight) || weight < 30 || weight > 200) {
                        this.showError('体重请输入30-200kg');
                        return;
                    }

                    const isValid = await this.sync.validateToken(token);
                    if (!isValid) {
                        this.showError('Token无效');
                        return;
                    }

                    const existing = await this.sync.loadUserData(username);
                    if (existing) {
                        this.showError('用户已存在，请直接登录');
                        return;
                    }

                    const goalWeight = calculateWeightFromBMI(this.bmiValue, height);

                    const today = new Date();
                    const monthKey = getMonthKey(today);
                    const dayKey = getDayKey(today);
                    
                    const userData = {
                        username,
                        height,
                        weight,
                        goal: goalWeight,
                        progress: {
                            [monthKey]: {
                                [dayKey]: [weight]
                            }
                        }
                    };

                    const saved = await this.sync.saveUserData(username, userData, token);
                    if (!saved) {
                        this.showError('保存用户数据失败');
                        return;
                    }

                    localStorage.setItem('github_token', token);

                    this.currentUser = username;
                    this.userData = userData;
                    this.view = 'main';
                    
                    localStorage.setItem(APP.STORAGE_KEY, JSON.stringify({
                        username: this.currentUser,
                        data: this.userData
                    }));
                    
                    this.render();
                }

                handleLogout() {
                    this.currentUser = null;
                    this.userData = null;
                    this.view = 'auth';
                    localStorage.removeItem(APP.STORAGE_KEY);
                    this.render();
                }

                addTodayEntry(weight) {
                    const num = parseFloat(weight);
                    if (isNaN(num) || num < 30 || num > 200) return false;
                    this.todayEntries.push(num);
                    this.render();
                    return true;
                }

                removeTodayEntry(index) {
                    this.todayEntries.splice(index, 1);
                    this.render();
                }

                async saveTodayWeight() {
                    if (this.todayEntries.length === 0) return;

                    const today = new Date();
                    const monthKey = getMonthKey(today);
                    const dayKey = getDayKey(today);

                    let targetWeight;
                    if (!this.userData.progress[monthKey] || !this.userData.progress[monthKey][dayKey]) {
                        const yesterday = new Date(today);
                        yesterday.setDate(yesterday.getDate() - 1);
                        const yesterdayTarget = this.getTargetForDate(yesterday);
                        
                        if (yesterdayTarget) {
                            targetWeight = calculateNextTarget(yesterdayTarget);
                        } else {
                            targetWeight = this.userData.weight;
                        }
                    } else {
                        targetWeight = this.userData.progress[monthKey][dayKey][0];
                    }

                    if (!this.userData.progress[monthKey]) {
                        this.userData.progress[monthKey] = {};
                    }

                    this.userData.progress[monthKey][dayKey] = [
                        Math.round(targetWeight * 100) / 100,
                        ...this.todayEntries.map(w => Math.round(w * 100) / 100)
                    ];

                    const token = localStorage.getItem('github_token');
                    const saved = await this.sync.saveUserData(this.currentUser, this.userData, token);

                    localStorage.setItem(APP.STORAGE_KEY, JSON.stringify({
                        username: this.currentUser,
                        data: this.userData
                    }));

                    this.prepareTodayEntries();
                    this.render();
                }

                getChartData() {
                    const today = new Date();
                    const dates = [];
                    
                    for (let i = this.chartStartIndex; i < this.chartStartIndex + 7; i++) {
                        const d = new Date(today);
                        d.setDate(today.getDate() - 5 + i);
                        dates.push(d);
                    }

                    return dates.map(date => {
                        const target = this.getTargetForDate(date);
                        const actual = this.getActualForDate(date);
                        
                        return {
                            date,
                            displayDate: `${date.getMonth() + 1}/${date.getDate()}`,
                            target,
                            actual
                        };
                    });
                }

                updateChart() {
                    if (this.chart) {
                        this.chart.destroy();
                    }

                    const ctx = document.getElementById('weight-chart');
                    if (!ctx) return;

                    const chartData = this.getChartData();
                    const labels = chartData.map(d => d.displayDate);
                    const actualData = chartData.map(d => d.actual);
                    const targetData = chartData.map(d => d.target);

                    const allValues = [...targetData.filter(v => v), ...actualData.filter(v => v)];
                    const minWeight = Math.floor((Math.min(50, ...allValues) - 2) / 5) * 5;
                    const maxWeight = Math.ceil((Math.max(100, ...allValues) + 2) / 5) * 5;

                    this.chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: '实际体重',
                                    data: actualData,
                                    borderColor: '#ef4444',
                                    backgroundColor: 'transparent',
                                    tension: 0.3,
                                    pointRadius: 4,
                                    pointHoverRadius: 6,
                                    pointBackgroundColor: '#ef4444',
                                    borderWidth: 2,
                                    spanGaps: true
                                },
                                {
                                    label: '目标体重',
                                    data: targetData,
                                    borderColor: '#10b981',
                                    backgroundColor: 'transparent',
                                    tension: 0.3,
                                    pointRadius: 4,
                                    pointHoverRadius: 6,
                                    pointBackgroundColor: '#10b981',
                                    borderWidth: 2,
                                    borderDash: [5, 3]
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#0f172a',
                                    titleColor: '#f8fafc',
                                    bodyColor: '#cbd5e1',
                                    padding: 12,
                                    cornerRadius: 16,
                                    displayColors: false,
                                    callbacks: {
                                        label: (context) => {
                                            const value = context.raw;
                                            return value ? `${value.toFixed(1)} kg` : '无数据';
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    min: minWeight,
                                    max: maxWeight,
                                    grid: { color: '#f1f5f9' },
                                    ticks: { stepSize: 5, color: '#94a3b8', font: { size: 10 } }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 45 }
                                }
                            }
                        }
                    });
                }

                async clearAllData() {
                    if (!this.currentUser) return;
                    
                    this.userData = null;
                    this.currentUser = null;
                    localStorage.removeItem(APP.STORAGE_KEY);
                    
                    this.view = 'auth';
                    this.showModal = null;
                    this.render();
                }

                exportData() {
                    const dataStr = JSON.stringify(this.userData, null, 2);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${this.currentUser}_weight_data.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    this.showModal = null;
                }

                importData(file) {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const data = JSON.parse(e.target.result);
                            if (!data.username || !data.height || !data.weight || !data.goal || !data.progress) {
                                alert('无效的数据格式');
                                return;
                            }
                            
                            this.userData = data;
                            
                            const token = localStorage.getItem('github_token');
                            await this.sync.saveUserData(this.currentUser, this.userData, token);
                            
                            localStorage.setItem(APP.STORAGE_KEY, JSON.stringify({
                                username: this.currentUser,
                                data: this.userData
                            }));
                            
                            this.prepareTodayEntries();
                            this.showModal = null;
                            this.render();
                        } catch (err) {
                            alert('导入失败：' + err.message);
                        }
                    };
                    reader.readAsText(file);
                }

                showError(msg) {
                    this.errorMsg = msg;
                    this.render();
                    setTimeout(() => {
                        this.errorMsg = null;
                        this.render();
                    }, 3000);
                }

                render() {
                    const app = document.getElementById('app');
                    
                    if (this.view === 'auth') {
                        app.innerHTML = this.renderAuth();
                        this.attachAuthEvents();
                    } else {
                        app.innerHTML = this.renderMain();
                        this.attachMainEvents();
                        setTimeout(() => this.updateChart(), 50);
                    }

                    if (this.showModal) {
                        this.renderModal();
                    }
                }

                renderAuth() {
                    return `
                        <div class="auth-container">
                            <div class="auth-title">体重日记</div>
                            <div class="auth-subtitle">记录你的减肥旅程</div>
                            
                            <div class="auth-tabs">
                                <button class="auth-tab ${this.authMode === 'login' ? 'active' : ''}" data-auth-mode="login">登录</button>
                                <button class="auth-tab ${this.authMode === 'register' ? 'active' : ''}" data-auth-mode="register">注册</button>
                            </div>

                            ${this.authMode === 'login' ? this.renderLogin() : this.renderRegister()}

                            ${this.errorMsg ? `<div class="auth-error">${this.errorMsg}</div>` : ''}
                        </div>
                    `;
                }

                renderLogin() {
                    return `
                        <div>
                            <input type="text" id="login-username" class="auth-input" placeholder="用户名" autocomplete="off">
                            <input type="password" id="login-token" class="auth-input" placeholder="GitHub Token" autocomplete="off">
                            <button id="login-btn" class="auth-btn">登录</button>
                        </div>
                    `;
                }

                renderRegister() {
                    const goalWeight = calculateWeightFromBMI(this.bmiValue, 170);
                    
                    return `
                        <div>
                            <input type="text" id="reg-username" class="auth-input" placeholder="用户名" autocomplete="off">
                            <input type="number" id="reg-height" class="auth-input" placeholder="身高 (cm)" step="1" min="100" max="250">
                            <input type="number" id="reg-weight" class="auth-input" placeholder="当前体重 (kg)" step="0.1" min="30" max="200">
                            
                            <div class="bmi-slider-container">
                                <div class="bmi-label">
                                    <span>目标BMI</span>
                                    <span class="bmi-value">${this.bmiValue.toFixed(1)}</span>
                                </div>
                                <input type="range" id="bmi-slider" min="18.5" max="28" step="0.1" value="${this.bmiValue}">
                                <div class="bmi-range-labels">
                                    <span>偏瘦 18.5</span>
                                    <span>正常 22</span>
                                    <span>偏胖 25</span>
                                    <span>肥胖 28</span>
                                </div>
                            </div>

                            <div class="target-weight-preview">
                                <div class="label">目标体重</div>
                                <div class="value" id="target-weight-display">${goalWeight.toFixed(1)} kg</div>
                            </div>

                            <input type="password" id="reg-token" class="auth-input" placeholder="GitHub Token" autocomplete="off">
                            <button id="register-btn" class="auth-btn">注册</button>
                        </div>
                    `;
                }

                renderMain() {
                    const today = new Date();
                    const todayTarget = this.getTargetForDate(today) || this.userData.weight;
                    const todayAvg = this.todayEntries.length > 0 
                        ? (this.todayEntries.reduce((a, b) => a + b, 0) / this.todayEntries.length).toFixed(2)
                        : '--';

                    let currentWeight = this.userData.weight;
                    const months = Object.keys(this.userData.progress || {}).sort().reverse();
                    for (let month of months) {
                        const days = Object.keys(this.userData.progress[month]).sort().reverse();
                        for (let day of days) {
                            const dayData = this.userData.progress[month][day];
                            if (dayData.length > 1) {
                                const actuals = dayData.slice(1);
                                currentWeight = actuals.reduce((a, b) => a + b, 0) / actuals.length;
                                break;
                            }
                        }
                        if (currentWeight !== this.userData.weight) break;
                    }

                    const progress = ((this.userData.weight - currentWeight) / (this.userData.weight - this.userData.goal) * 100).toFixed(1);

                    return `
                        <div>
                            <div class="header">
                                <div class="user-info">
                                    <div class="user-avatar">${this.currentUser[0].toUpperCase()}</div>
                                    <div class="user-details">
                                        <div class="user-name">${this.currentUser}</div>
                                        <div class="user-stats">${this.userData.height}cm · 目标 ${this.userData.goal}kg</div>
                                    </div>
                                </div>
                                <button id="menu-btn" class="menu-btn">⋯</button>
                                <div id="dropdown-menu" class="dropdown-menu ${this.showMenu ? 'show' : ''}">
                                    <div class="menu-item" data-action="clear">清除所有数据</div>
                                    <div class="menu-item" data-action="export">导出数据</div>
                                    <div class="menu-item" data-action="import">导入数据</div>
                                    <div class="menu-item danger" data-action="logout">退出登录</div>
                                </div>
                            </div>

                            <div class="target-card">
                                <div class="target-header">
                                    <span class="target-title">今日目标</span>
                                    <span class="target-value">${todayTarget.toFixed(1)}<span class="target-unit">kg</span></span>
                                </div>
                                
                                <div class="progress-section">
                                    <div class="progress-label">
                                        <span>进度</span>
                                        <span>${progress}%</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" style="width: ${Math.min(100, Math.max(0, progress))}%"></div>
                                    </div>
                                    <div class="target-stats">
                                        <span>起始 ${this.userData.weight}kg</span>
                                        <span>目标 ${this.userData.goal}kg</span>
                                    </div>
                                </div>
                            </div>

                            <div class="input-section">
                                <div class="section-title">今日录入</div>
                                
                                <div class="input-row">
                                    <input type="number" id="weight-input" class="weight-input" step="0.01" placeholder="输入体重" autocomplete="off">
                                    <button id="add-weight-btn" class="add-btn">+</button>
                                </div>

                                <div class="entries-list" id="entries-list">
                                    ${this.todayEntries.map((w, i) => `
                                        <span class="entry-tag">
                                            ${w.toFixed(2)} kg
                                            <span class="remove-entry" data-index="${i}">×</span>
                                        </span>
                                    `).join('')}
                                </div>

                                <div class="average-info">
                                    今日平均 <strong>${todayAvg}</strong> kg
                                </div>

                                <button id="save-today-btn" class="save-btn" ${this.todayEntries.length === 0 ? 'disabled' : ''}>
                                    保存今日记录
                                </button>
                            </div>

                            <div class="chart-section">
                                <div class="chart-header">
                                    <div class="chart-legend">
                                        <div class="legend-item">
                                            <span class="legend-dot dot-red"></span>
                                            <span>实际</span>
                                        </div>
                                        <div class="legend-item">
                                            <span class="legend-dot dot-green"></span>
                                            <span>目标</span>
                                        </div>
                                    </div>
                                    <div>
                                        <button id="chart-prev" class="nav-btn">←</button>
                                        <button id="chart-next" class="nav-btn">→</button>
                                    </div>
                                </div>

                                <div class="chart-container">
                                    <canvas id="weight-chart"></canvas>
                                </div>
                            </div>

                            <div class="sync-status">
                                ${localStorage.getItem(APP.SYNC_STATUS_KEY) ? '已同步' : '等待同步'}
                            </div>
                        </div>
                    `;
                }

                renderModal() {
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    
                    let content = '';
                    switch (this.showModal.type) {
                        case 'clear':
                            content = `
                                <div class="modal-content">
                                    <div class="modal-title">清除所有数据</div>
                                    <div class="modal-text">确定要清除所有数据吗？此操作不可恢复。</div>
                                    <div class="modal-btns">
                                        <button class="modal-btn secondary" id="modal-cancel">取消</button>
                                        <button class="modal-btn danger" id="modal-confirm-clear">清除</button>
                                    </div>
                                </div>
                            `;
                            break;
                        case 'export':
                            this.exportData();
                            return;
                        case 'import':
                            content = `
                                <div class="modal-content">
                                    <div class="modal-title">导入数据</div>
                                    <div class="modal-text">选择JSON文件导入</div>
                                    <input type="file" id="import-file" class="file-input" accept=".json">
                                    <div class="modal-btns">
                                        <button class="modal-btn secondary" id="modal-cancel">取消</button>
                                        <button class="modal-btn primary" id="modal-confirm-import">选择文件</button>
                                    </div>
                                </div>
                            `;
                            break;
                        case 'fail':
                            content = `
                                <div class="modal-content">
                                    <div class="modal-title">减肥失败</div>
                                    <div class="modal-text">${this.showModal.message}</div>
                                    <div class="modal-btns">
                                        <button class="modal-btn primary" id="modal-ok">确定</button>
                                    </div>
                                </div>
                            `;
                            break;
                    }

                    modal.innerHTML = content;
                    document.body.appendChild(modal);

                    document.getElementById('modal-cancel')?.addEventListener('click', () => {
                        document.body.removeChild(modal);
                        this.showModal = null;
                    });

                    document.getElementById('modal-confirm-clear')?.addEventListener('click', () => {
                        this.clearAllData();
                        document.body.removeChild(modal);
                    });

                    document.getElementById('modal-confirm-import')?.addEventListener('click', () => {
                        document.getElementById('import-file').click();
                    });

                    document.getElementById('import-file')?.addEventListener('change', (e) => {
                        if (e.target.files.length > 0) {
                            this.importData(e.target.files[0]);
                            document.body.removeChild(modal);
                        }
                    });

                    document.getElementById('modal-ok')?.addEventListener('click', () => {
                        document.body.removeChild(modal);
                        this.showModal = null;
                    });
                }

                attachAuthEvents() {
                    document.querySelectorAll('.auth-tab').forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            this.authMode = e.target.dataset.authMode;
                            this.render();
                        });
                    });

                    if (this.authMode === 'login') {
                        document.getElementById('login-btn')?.addEventListener('click', () => {
                            const username = document.getElementById('login-username').value;
                            const token = document.getElementById('login-token').value;
                            this.handleLogin(username, token);
                        });
                    } else {
                        const slider = document.getElementById('bmi-slider');
                        if (slider) {
                            slider.addEventListener('input', (e) => {
                                this.bmiValue = parseFloat(e.target.value);
                                const height = parseFloat(document.getElementById('reg-height').value) || 170;
                                document.getElementById('target-weight-display').textContent = 
                                    calculateWeightFromBMI(this.bmiValue, height).toFixed(1) + ' kg';
                            });
                        }

                        document.getElementById('reg-height')?.addEventListener('input', () => {
                            const height = parseFloat(document.getElementById('reg-height').value) || 170;
                            document.getElementById('target-weight-display').textContent = 
                                calculateWeightFromBMI(this.bmiValue, height).toFixed(1) + ' kg';
                        });

                        document.getElementById('register-btn')?.addEventListener('click', () => {
                            const username = document.getElementById('reg-username').value;
                            const height = document.getElementById('reg-height').value;
                            const weight = document.getElementById('reg-weight').value;
                            const token = document.getElementById('reg-token').value;
                            this.handleRegister(username, height, weight, token);
                        });
                    }
                }

                attachMainEvents() {
                    document.getElementById('menu-btn')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.showMenu = !this.showMenu;
                        this.render();
                    });

                    document.addEventListener('click', (e) => {
                        if (!e.target.closest('#menu-btn') && !e.target.closest('.dropdown-menu')) {
                            this.showMenu = false;
                            this.render();
                        }
                    });

                    document.querySelectorAll('[data-action]').forEach(item => {
                        item.addEventListener('click', (e) => {
                            const action = e.target.dataset.action;
                            this.showMenu = false;
                            
                            switch (action) {
                                case 'logout':
                                    this.handleLogout();
                                    break;
                                case 'clear':
                                    this.showModal = { type: 'clear' };
                                    this.render();
                                    break;
                                case 'export':
                                    this.showModal = { type: 'export' };
                                    this.render();
                                    break;
                                case 'import':
                                    this.showModal = { type: 'import' };
                                    this.render();
                                    break;
                            }
                        });
                    });

                    const addBtn = document.getElementById('add-weight-btn');
                    const weightInput = document.getElementById('weight-input');

                    if (addBtn && weightInput) {
                        const addWeight = () => {
                            this.addTodayEntry(weightInput.value);
                            weightInput.value = '';
                        };

                        addBtn.addEventListener('click', addWeight);
                        weightInput.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') addWeight();
                        });
                    }

                    document.querySelectorAll('.remove-entry').forEach(el => {
                        el.addEventListener('click', (e) => {
                            const index = e.target.dataset.index;
                            if (index !== undefined) {
                                this.removeTodayEntry(parseInt(index));
                            }
                        });
                    });

                    document.getElementById('save-today-btn')?.addEventListener('click', () => {
                        this.saveTodayWeight();
                    });

                    document.getElementById('chart-prev')?.addEventListener('click', () => {
                        if (this.chartStartIndex > 0) {
                            this.chartStartIndex--;
                            this.updateChart();
                        }
                    });

                    document.getElementById('chart-next')?.addEventListener('click', () => {
                        this.chartStartIndex++;
                        this.updateChart();
                    });
                }
            }

            window.addEventListener('DOMContentLoaded', () => {
                new WeightApp();
            });
        })();
    </script>
</body>
</html>

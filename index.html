<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>每日减重</title>
    <!-- Appwrite SDK (使用备用CDN确保加载成功) -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0/dist/umd/sdk.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px 12px 40px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0,20,30,0.1);
            padding: 24px 20px 30px;
        }
        .target-section {
            background: linear-gradient(145deg, #2b3a4a, #1d2a36);
            border-radius: 28px;
            padding: 22px 18px;
            color: white;
            margin-bottom: 24px;
        }
        .target-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .target-value {
            font-size: 34px;
            font-weight: 700;
        }
        .target-value small { font-size: 16px; opacity: 0.8; margin-left: 4px; }
        .date-value {
            font-size: 20px;
            background: rgba(255,255,255,0.15);
            padding: 6px 16px;
            border-radius: 60px;
        }
        .sub-meta {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 14px;
            font-size: 15px;
            opacity: 0.9;
        }
        .today-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 18px 16px;
            margin-bottom: 22px;
            border: 1px solid #eef2f6;
        }
        .weight-input-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .weight-input-row input {
            flex: 2;
            border: none;
            background: #f2f6fa;
            border-radius: 48px;
            padding: 18px 20px;
            font-size: 28px;
            font-weight: 600;
            outline: 2px solid transparent;
        }
        .weight-input-row input:focus {
            outline: 2px solid #2b3a4a;
            background: #ffffff;
        }
        .weight-input-row button {
            flex: 1;
            background: #1d2a36;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 18px;
            padding: 18px 10px;
            border-radius: 56px;
            cursor: pointer;
        }
        .weight-input-row button:active { background: #0e1a24; transform: scale(0.97); }
        .today-goal-card {
            background: #eaf0f6;
            border-radius: 40px;
            padding: 18px 22px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
        }
        .goal-number {
            font-size: 42px;
            font-weight: 800;
            color: #0c1a26;
        }
        .goal-number small { font-size: 18px; color: #4c6475; }
        .chart-container {
            background: white;
            border-radius: 32px;
            padding: 16px 8px;
            border: 1px solid #dee9f0;
        }
        canvas { width: 100% !important; height: auto !important; max-height: 220px; }
        .init-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .init-card {
            background: white;
            max-width: 380px;
            width: 100%;
            border-radius: 40px;
            padding: 32px 26px;
            box-shadow: 0 30px 50px rgba(0,20,30,0.4);
        }
        .init-card h3 { font-size: 24px; margin-bottom: 8px; color: #14222e; }
        .init-desc { color: #547183; margin-bottom: 28px; }
        .init-field { margin-bottom: 20px; }
        .init-field label {
            font-weight: 500;
            color: #1f313f;
            margin-bottom: 6px;
            display: block;
        }
        .init-field input {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            border-radius: 50px;
            border: 1px solid #b9ccdb;
            background: #f4f9ff;
        }
        .init-btn {
            background: #1d2a36;
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            font-size: 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .username-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 10px 16px;
            background: #e9f0f7;
            border-radius: 40px;
        }
        .username-display {
            font-weight: 600;
            color: #1d2a36;
        }
        .switch-user-btn {
            background: none;
            border: none;
            color: #2b577c;
            font-size: 14px;
            text-decoration: underline;
            cursor: pointer;
        }
        .hidden { display: none !important; }
        .today-hint {
            font-size: 13px;
            color: #2e5775;
            margin-top: 8px;
            background: #e3eef9;
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-block;
        }
        .sync-status {
            font-size: 12px;
            color: #4f7a9e;
            margin-left: 8px;
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #c62828;
        }
    </style>
</head>
<body>
    <!-- 登录/初始化遮罩 -->
    <div id="initOverlay" class="init-overlay">
        <div class="init-card">
            <h3>🔑 输入用户名</h3>
            <div class="init-desc">新用户会自动进入初始化设置</div>
            <div id="dbError" class="error-message hidden"></div>
            <div class="init-field">
                <label>用户名</label>
                <input type="text" id="usernameInput" placeholder="例如: john" value="">
            </div>
            <button class="init-btn" id="loginBtn">继续</button>
        </div>
    </div>

    <!-- 新用户身高体重输入遮罩 -->
    <div id="newUserOverlay" class="init-overlay hidden">
        <div class="init-card">
            <h3>⚡ 首次设置</h3>
            <div class="init-desc">输入当前体重与身高，生成科学每日目标</div>
            <div class="init-field">
                <label>🔹 当前体重 (kg)</label>
                <input type="number" id="newWeight" step="0.01" min="20" max="250" value="70.00">
            </div>
            <div class="init-field">
                <label>🔹 身高 (cm)</label>
                <input type="number" id="newHeight" step="0.1" min="120" max="230" value="170">
            </div>
            <button class="init-btn" id="saveNewUserBtn">开始减重 →</button>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="mainApp" class="card hidden">
        <div class="username-bar">
            <span class="username-display" id="currentUsername"></span>
            <button class="switch-user-btn" id="switchUserBtn">切换用户</button>
        </div>

        <div class="target-section">
            <div class="target-row">
                <span class="target-label">🎯 目标体重</span>
                <span class="target-value" id="displayTargetWeight">--<small>kg</small></span>
            </div>
            <div class="target-row">
                <span class="target-label">📅 达成日期</span>
                <span class="date-value" id="displayTargetDate">----/--/--</span>
            </div>
            <div class="sub-meta">
                <span>⚖️ 健康 BMI 范围</span>
                <span id="displayBmiRange">-- ~ --</span>
            </div>
        </div>

        <div class="today-card">
            <div class="today-label">
                📝 今日体重 <span id="todayDateTag"></span>
                <span id="todayCountBadge" style="background:#c0d6e6;">0次</span>
                <span class="sync-status" id="syncStatus"></span>
            </div>
            <div class="weight-input-row">
                <input type="number" id="todayWeightInput" step="0.01" placeholder="例如 77.20">
                <button id="submitWeightBtn">+ 录入</button>
            </div>
            <div id="todayMeanHint" class="today-hint">✨ 当前均值: -- kg</div>
        </div>

        <div class="today-goal-card">
            <span class="goal-text">📌 今日目标</span>
            <span class="goal-number" id="todayGoalWeight">--<small>kg</small></span>
        </div>

        <div class="chart-container">
            <canvas id="weightChart" width="400" height="200"></canvas>
        </div>
        <div style="text-align:center; font-size:11px; color:#a1b7c8; margin-top:16px;">
            ⚡ 数据实时同步至Appwrite
        </div>
    </div>

    <script>
        (function() {
            // ---------- Appwrite 配置 (根据您的截图) ----------
            const APPWRITE_ENDPOINT = '/api/v1';
            const APPWRITE_PROJECT_ID = 'myfit';
            const APPWRITE_DATABASE_ID = 'myfit_db';
            const USERS_COLLECTION_ID = 'users';
            const RECORDS_COLLECTION_ID = 'fit_records';

            // 全局变量
            let client = null;
            let databases = null;
            let isAppwriteReady = false;
            let chartInstance = null;
            let currentUser = null;
            let rawEntries = {};
            let renderTimeout = null;

            // ---------- 初始化Appwrite ----------
            function initAppwrite() {
                try {
                    if (typeof Appwrite === 'undefined') {
                        showError('Appwrite SDK 加载失败，请刷新页面重试');
                        return false;
                    }
                    
                    client = new Appwrite.Client();
                    client.setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
                    databases = new Appwrite.Databases(client);
                    isAppwriteReady = true;
                    
                    // 测试连接
                    testConnection();
                    return true;
                } catch (error) {
                    console.error('Appwrite初始化失败:', error);
                    showError('数据库连接失败: ' + error.message);
                    return false;
                }
            }

            // 测试数据库连接
            async function testConnection() {
                try {
                    // 尝试列出集合（仅测试权限）
                    await databases.listDocuments(APPWRITE_DATABASE_ID, USERS_COLLECTION_ID, [Appwrite.Query.limit(1)]);
                    console.log('数据库连接成功');
                } catch (error) {
                    console.error('数据库连接测试失败:', error);
                    showError('无法连接到数据库，请检查：\n1. Project ID 是否正确\n2. Database ID 是否正确\n3. 集合是否已创建\n4. 权限设置是否正确');
                }
            }

            // 显示错误信息
            function showError(message) {
                const errorEl = document.getElementById('dbError');
                if (errorEl) {
                    errorEl.classList.remove('hidden');
                    errorEl.innerText = message;
                }
            }

            // ---------- 工具函数 ----------
            function getTodayDateStr() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }

            function getDisplayDates() {
                const today = new Date();
                const dates = [];
                for (let i = 9; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(today.getDate() - i);
                    dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                }
                const tomorrow = new Date(today);
                tomorrow.setDate(today.getDate() + 1);
                dates.push(`${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,'0')}-${String(tomorrow.getDate()).padStart(2,'0')}`);
                return dates;
            }

            function getHealthyWeightRange(heightCm) {
                const h = heightCm / 100;
                return {
                    low: (18.5 * h * h).toFixed(1),
                    high: (24.0 * h * h).toFixed(1)
                };
            }

            function computeTargetWeight(weight, heightCm) {
                const h = heightCm / 100;
                const currentBMI = weight / (h * h);
                if (currentBMI > 24) {
                    return Math.round((24.0 * h * h) * 100) / 100;
                }
                return weight;
            }

            function generateDailyTargets(startWeight, targetWeight, startDateStr) {
                const totalLoss = startWeight - targetWeight;
                if (totalLoss <= 0) return [{ date: startDateStr, target: startWeight }];

                const maxDailyLoss = 0.1;
                const minDaysNeeded = Math.ceil(totalLoss / maxDailyLoss);
                const ratio = targetWeight / startWeight;
                const dailyRate = 1 - Math.pow(ratio, 1 / minDaysNeeded);
                
                const dates = [];
                const start = new Date(startDateStr);
                let currentWeight = startWeight;
                
                for (let i = 0; i <= minDaysNeeded; i++) {
                    const d = new Date(start);
                    d.setDate(start.getDate() + i);
                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    
                    const target = i === 0 ? startWeight : Math.round(currentWeight * (1 - dailyRate) * 100) / 100;
                    dates.push({ date: dateStr, target });
                    currentWeight = target;
                }
                return dates;
            }

            // ---------- 云端操作 ----------
            async function findUserByUsername(username) {
                if (!isAppwriteReady) throw new Error('数据库未就绪');
                try {
                    const response = await databases.listDocuments(
                        APPWRITE_DATABASE_ID,
                        USERS_COLLECTION_ID,
                        [Appwrite.Query.equal('username', username)]
                    );
                    return response.documents.length > 0 ? response.documents[0] : null;
                } catch (error) {
                    console.error('查找用户失败:', error);
                    throw error;
                }
            }

            async function createUser(username, weight, height) {
                if (!isAppwriteReady) throw new Error('数据库未就绪');
                const targetWeight = computeTargetWeight(weight, height);
                const startDate = getTodayDateStr();
                const dailySeries = generateDailyTargets(weight, targetWeight, startDate);
                const targetDate = dailySeries[dailySeries.length - 1].date;
                
                const userData = {
                    username,
                    height,
                    start_weight: weight,
                    target_weight: targetWeight,
                    target_date: targetDate,
                    daily_series: JSON.stringify(dailySeries)
                };
                
                try {
                    const response = await databases.createDocument(
                        APPWRITE_DATABASE_ID,
                        USERS_COLLECTION_ID,
                        'unique()',
                        userData
                    );
                    return response;
                } catch (error) {
                    console.error('创建用户失败:', error);
                    throw error;
                }
            }

            async function fetchUserRecords(username) {
                if (!isAppwriteReady) return {};
                try {
                    const response = await databases.listDocuments(
                        APPWRITE_DATABASE_ID,
                        RECORDS_COLLECTION_ID,
                        [
                            Appwrite.Query.equal('username', username),
                            Appwrite.Query.limit(1000)
                        ]
                    );
                    
                    const entries = {};
                    response.documents.forEach(doc => {
                        entries[doc.date] = doc.entries || [];
                    });
                    return entries;
                } catch (error) {
                    console.error('获取记录失败:', error);
                    return {};
                }
            }

            async function saveRecord(username, date, entries) {
                if (!isAppwriteReady) return;
                const avg = entries.length > 0 
                    ? Math.round((entries.reduce((a,b)=>a+b,0) / entries.length) * 100) / 100
                    : null;
                
                try {
                    const existing = await databases.listDocuments(
                        APPWRITE_DATABASE_ID,
                        RECORDS_COLLECTION_ID,
                        [
                            Appwrite.Query.equal('username', username),
                            Appwrite.Query.equal('date', date)
                        ]
                    );
                    
                    const recordData = {
                        username,
                        date,
                        entries,
                        avg_weight: avg
                    };
                    
                    if (existing.documents.length > 0) {
                        await databases.updateDocument(
                            APPWRITE_DATABASE_ID,
                            RECORDS_COLLECTION_ID,
                            existing.documents[0].$id,
                            recordData
                        );
                    } else {
                        await databases.createDocument(
                            APPWRITE_DATABASE_ID,
                            RECORDS_COLLECTION_ID,
                            'unique()',
                            recordData
                        );
                    }
                } catch (error) {
                    console.error('保存记录失败:', error);
                    throw error;
                }
            }

            // ---------- UI 更新 ----------
            function updateTodayUI() {
                const today = getTodayDateStr();
                const entries = rawEntries[today] || [];
                document.getElementById('todayCountBadge').innerText = entries.length + '次';
                
                if (entries.length > 0) {
                    const avg = entries.reduce((a,b)=>a+b,0) / entries.length;
                    document.getElementById('todayMeanHint').innerHTML = `✨ 当前均值: ${avg.toFixed(2)} kg`;
                } else {
                    document.getElementById('todayMeanHint').innerHTML = '✨ 当前均值: -- kg';
                }
            }

            function updateTodayGoal() {
                if (!currentUser) return;
                const today = getTodayDateStr();
                const entries = rawEntries[today] || [];
                
                if (entries.length > 0) {
                    const avg = entries.reduce((a,b)=>a+b,0) / entries.length;
                    document.getElementById('todayGoalWeight').innerHTML = avg.toFixed(2) + '<small>kg</small>';
                } else {
                    const dailySeries = JSON.parse(currentUser.daily_series);
                    const found = dailySeries.find(d => d.date === today);
                    if (found) {
                        document.getElementById('todayGoalWeight').innerHTML = found.target + '<small>kg</small>';
                    } else {
                        const last = dailySeries[dailySeries.length - 1];
                        document.getElementById('todayGoalWeight').innerHTML = (last ? last.target : '--') + '<small>kg</small>';
                    }
                }
            }

            function refreshTopMeta() {
                if (!currentUser) return;
                document.getElementById('displayTargetWeight').innerHTML = currentUser.target_weight + '<small>kg</small>';
                document.getElementById('displayTargetDate').innerText = currentUser.target_date;
                const range = getHealthyWeightRange(currentUser.height);
                document.getElementById('displayBmiRange').innerText = `${range.low} ~ ${range.high} kg`;
                updateTodayGoal();
            }

            function renderChart() {
                if (!currentUser) return;
                if (renderTimeout) clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => {
                    actuallyRenderChart();
                }, 50);
            }

            function actuallyRenderChart() {
                if (!currentUser) return;
                
                const ctx = document.getElementById('weightChart').getContext('2d');
                const displayDates = getDisplayDates();
                const dailySeries = JSON.parse(currentUser.daily_series);
                const targetMap = new Map(dailySeries.map(d => [d.date, d.target]));
                
                const targetData = displayDates.map(date => targetMap.get(date) || null);
                
                const avgMap = new Map();
                Object.entries(rawEntries).forEach(([date, entries]) => {
                    if (entries.length > 0) {
                        const avg = entries.reduce((a,b)=>a+b,0) / entries.length;
                        avgMap.set(date, Math.round(avg * 100) / 100);
                    }
                });
                const actualData = displayDates.map(date => avgMap.get(date) || null);
                
                const labels = displayDates.map((d, i) => {
                    const mmdd = d.slice(5);
                    return i === displayDates.length-1 ? `🌟${mmdd}` : mmdd;
                });

                if (chartInstance) {
                    chartInstance.data.labels = labels;
                    chartInstance.data.datasets[0].data = actualData;
                    chartInstance.data.datasets[1].data = targetData;
                    chartInstance.update();
                } else {
                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                {
                                    label: '实际体重',
                                    data: actualData,
                                    borderColor: '#2e7d32',
                                    backgroundColor: 'rgba(46,125,50,0.05)',
                                    tension: 0.15,
                                    pointBackgroundColor: '#2e7d32',
                                    pointRadius: 4,
                                    spanGaps: true,
                                    borderWidth: 3
                                },
                                {
                                    label: '目标体重',
                                    data: targetData,
                                    borderColor: '#d32f2f',
                                    borderDash: [6, 6],
                                    tension: 0,
                                    pointRadius: 2,
                                    borderWidth: 2.5
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: {
                                    ticks: { callback: v => v.toFixed(2) + 'kg' }
                                }
                            },
                            animation: { duration: 0 }
                        }
                    });
                }
            }

            async function syncFromCloud(username) {
                document.getElementById('syncStatus').innerText = '⏳ 同步中...';
                const records = await fetchUserRecords(username);
                rawEntries = records;
                updateTodayUI();
                updateTodayGoal();
                renderChart();
                document.getElementById('syncStatus').innerText = '✅ 已同步';
                setTimeout(() => {
                    document.getElementById('syncStatus').innerText = '';
                }, 2000);
            }

            async function pushToCloud(username, date, entries) {
                await saveRecord(username, date, entries);
                rawEntries[date] = entries;
                document.getElementById('syncStatus').innerText = '☁️ 已保存';
                setTimeout(() => {
                    document.getElementById('syncStatus').innerText = '';
                }, 1000);
            }

            async function login(username) {
                try {
                    const user = await findUserByUsername(username);
                    if (user) {
                        currentUser = user;
                        localStorage.setItem('lastUsername', username);
                        await syncFromCloud(username);
                        document.getElementById('initOverlay').classList.add('hidden');
                        document.getElementById('newUserOverlay').classList.add('hidden');
                        document.getElementById('mainApp').classList.remove('hidden');
                        document.getElementById('currentUsername').innerText = username;
                        refreshTopMeta();
                    } else {
                        document.getElementById('initOverlay').classList.add('hidden');
                        document.getElementById('newUserOverlay').classList.remove('hidden');
                        document.getElementById('newUserOverlay').dataset.username = username;
                    }
                } catch (error) {
                    showError('登录失败: ' + error.message);
                }
            }

            // ---------- 初始化 ----------
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('todayDateTag').innerText = getTodayDateStr();
                
                // 初始化Appwrite
                const initSuccess = initAppwrite();
                
                if (initSuccess) {
                    const lastUser = localStorage.getItem('lastUsername');
                    if (lastUser) {
                        login(lastUser);
                    } else {
                        document.getElementById('initOverlay').classList.remove('hidden');
                    }
                }

                document.getElementById('loginBtn').addEventListener('click', async function() {
                    const username = document.getElementById('usernameInput').value.trim();
                    if (!username) {
                        alert('请输入用户名');
                        return;
                    }
                    await login(username);
                });

                document.getElementById('saveNewUserBtn').addEventListener('click', async function() {
                    const username = document.getElementById('newUserOverlay').dataset.username;
                    const weight = parseFloat(document.getElementById('newWeight').value);
                    const height = parseFloat(document.getElementById('newHeight').value);
                    
                    if (!username || isNaN(weight) || isNaN(height)) {
                        alert('请完整填写信息');
                        return;
                    }
                    
                    try {
                        const user = await createUser(username, weight, height);
                        if (user) {
                            currentUser = user;
                            localStorage.setItem('lastUsername', username);
                            rawEntries = {};
                            await syncFromCloud(username);
                            document.getElementById('newUserOverlay').classList.add('hidden');
                            document.getElementById('mainApp').classList.remove('hidden');
                            document.getElementById('currentUsername').innerText = username;
                            refreshTopMeta();
                        }
                    } catch (error) {
                        showError('创建用户失败: ' + error.message);
                    }
                });

                document.getElementById('submitWeightBtn').addEventListener('click', async function() {
                    if (!currentUser) return;
                    
                    const input = document.getElementById('todayWeightInput');
                    const weight = parseFloat(input.value);
                    if (isNaN(weight) || weight < 10 || weight > 300) {
                        alert('请输入有效体重 (10-300kg)');
                        return;
                    }
                    
                    const today = getTodayDateStr();
                    if (!rawEntries[today]) rawEntries[today] = [];
                    rawEntries[today].push(weight);
                    
                    try {
                        await pushToCloud(currentUser.username, today, rawEntries[today]);
                        updateTodayUI();
                        updateTodayGoal();
                        renderChart();
                        input.value = '';
                    } catch (error) {
                        showError('保存失败: ' + error.message);
                    }
                });

                document.getElementById('switchUserBtn').addEventListener('click', function() {
                    currentUser = null;
                    localStorage.removeItem('lastUsername');
                    document.getElementById('mainApp').classList.add('hidden');
                    document.getElementById('initOverlay').classList.remove('hidden');
                    document.getElementById('usernameInput').value = '';
                });
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Percy的体重日记</title>
    <style>
        /* ... 之前的样式保持不变 ... */
        
        /* 添加同步状态样式 */
        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
        
        .sync-status.syncing {
            color: #3b82f6;
        }
        
        .sync-status.success {
            color: #10b981;
        }
        
        .sync-status.error {
            color: #ef4444;
        }
        
        .sync-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .last-sync {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // 常量定义
            const APP = {
                USERNAME: 'percy',
                START_WEIGHT: 91.3,
                TARGET_WEIGHT: 73,
                STORAGE_KEY: 'weight_app_user',
                DATA_KEY: 'weight_app_data',
                GITHUB_REPO: '你的用户名/你的仓库名', // TODO: 修改为你的仓库
                GITHUB_TOKEN: null, // 将通过个人访问令牌设置
                SYNC_STATUS_KEY: 'last_sync_time'
            };
            
            // 生成未来所有目标体重
            function generateAllTargets(startDate = new Date()) {
                const targets = [];
                let currentTarget = APP.START_WEIGHT;
                let currentDate = new Date(startDate);
                currentDate.setHours(0, 0, 0, 0);
                
                for (let i = 0; i < 365; i++) {
                    targets.push({
                        date: new Date(currentDate),
                        target: Number(currentTarget.toFixed(2))
                    });
                    
                    const nextTarget = currentTarget - (currentTarget * 0.0007 + 0.13) / 2;
                    currentTarget = Math.max(nextTarget, APP.TARGET_WEIGHT);
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                return targets;
            }
            
            // 获取目标体重
            function getTargetForDate(date, targets) {
                const target = targets.find(t => 
                    t.date.toDateString() === date.toDateString()
                );
                return target ? target.target : null;
            }
            
            // 计算进度百分比
            function calculateProgress(currentWeight) {
                const total = APP.START_WEIGHT - APP.TARGET_WEIGHT;
                const progress = APP.START_WEIGHT - currentWeight;
                return Math.min(100, Math.max(0, (progress / total) * 100));
            }
            
            // 获取最近11天日期
            function getDateRange(referenceDate = new Date()) {
                const dates = [];
                const ref = new Date(referenceDate);
                ref.setHours(0, 0, 0, 0);
                
                for (let i = 9; i >= 1; i--) {
                    const d = new Date(ref);
                    d.setDate(ref.getDate() - i);
                    dates.push(d);
                }
                dates.push(new Date(ref));
                const tomorrow = new Date(ref);
                tomorrow.setDate(ref.getDate() + 1);
                dates.push(tomorrow);
                
                return dates;
            }
            
            // 格式化日期
            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            
            function formatDisplayDate(date) {
                const m = date.getMonth() + 1;
                const d = date.getDate();
                return `${m}/${d}`;
            }
            
            // GitHub Actions 同步类
            class GitHubSync {
                constructor(repo) {
                    this.repo = repo;
                    this.syncInProgress = false;
                    this.lastSyncTime = localStorage.getItem(APP.SYNC_STATUS_KEY) || null;
                }
                
                // 通过 GitHub Actions 保存数据
                async saveData(data) {
                    if (this.syncInProgress) {
                        console.log('同步正在进行中...');
                        return { success: false, message: '同步中' };
                    }
                    
                    this.syncInProgress = true;
                    this.updateSyncStatus('syncing');
                    
                    try {
                        // 方法1: 使用 repository_dispatch (推荐，需要配置)
                        // 你需要先设置一个 GitHub Personal Access Token
                        const token = promptForGitHubToken(); // 会提示用户输入token
                        
                        if (!token) {
                            throw new Error('需要GitHub Token才能保存数据');
                        }
                        
                        const response = await fetch(`https://api.github.com/repos/${this.repo}/dispatches`, {
                            method: 'POST',
                            headers: {
                                'Accept': 'application/vnd.github.v3+json',
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                event_type: 'save-weight',
                                client_payload: data
                            })
                        });
                        
                        if (!response.ok) {
                            throw new Error(`GitHub API错误: ${response.status}`);
                        }
                        
                        // 更新最后同步时间
                        const now = new Date().toISOString();
                        localStorage.setItem(APP.SYNC_STATUS_KEY, now);
                        this.lastSyncTime = now;
                        
                        this.updateSyncStatus('success', '同步成功');
                        
                        // 同时也保存到本地作为备份
                        localStorage.setItem(APP.DATA_KEY, JSON.stringify(data));
                        
                        return { success: true, message: '同步请求已发送' };
                        
                    } catch (error) {
                        console.error('同步失败:', error);
                        this.updateSyncStatus('error', error.message);
                        
                        // 失败时至少保存到本地
                        localStorage.setItem(APP.DATA_KEY, JSON.stringify(data));
                        
                        return { success: false, message: error.message };
                    } finally {
                        this.syncInProgress = false;
                    }
                }
                
                // 从GitHub加载数据
                async loadData() {
                    try {
                        // 尝试从GitHub获取最新数据
                        const response = await fetch(`https://raw.githubusercontent.com/${this.repo}/main/data/weight-data.json?t=${Date.now()}`);
                        
                        if (response.ok) {
                            const data = await response.json();
                            localStorage.setItem(APP.DATA_KEY, JSON.stringify(data));
                            return data;
                        }
                    } catch (e) {
                        console.log('从GitHub加载失败，使用本地数据');
                    }
                    
                    // 降级到本地数据
                    const local = localStorage.getItem(APP.DATA_KEY);
                    return local ? JSON.parse(local) : {};
                }
                
                updateSyncStatus(status, message = '') {
                    const statusEl = document.getElementById('sync-status');
                    if (!statusEl) return;
                    
                    statusEl.className = `sync-status ${status}`;
                    
                    if (status === 'syncing') {
                        statusEl.innerHTML = `
                            <div class="sync-spinner"></div>
                            <span>正在同步到GitHub...</span>
                        `;
                    } else if (status === 'success') {
                        statusEl.innerHTML = `
                            <span>✅</span>
                            <span>${message || '已同步'}</span>
                        `;
                    } else if (status === 'error') {
                        statusEl.innerHTML = `
                            <span>❌</span>
                            <span>同步失败: ${message}</span>
                        `;
                    }
                }
                
                getLastSyncDisplay() {
                    if (!this.lastSyncTime) return '未同步';
                    
                    const date = new Date(this.lastSyncTime);
                    return `最后同步: ${date.toLocaleString()}`;
                }
            }
            
            // 提示输入GitHub Token
            function promptForGitHubToken() {
                // 先尝试从localStorage获取
                let token = localStorage.getItem('github_token');
                
                if (!token) {
                    token = prompt('请输入GitHub Personal Access Token (需要repo权限):\n\n如何获取:\n1. 访问 GitHub Settings -> Developer settings -> Personal access tokens -> Tokens (classic)\n2. 生成新token，勾选 repo 权限\n3. 复制token粘贴到这里');
                    
                    if (token) {
                        // 可选：保存token，方便下次使用
                        if (confirm('要保存这个token以便下次自动使用吗？')) {
                            localStorage.setItem('github_token', token);
                        }
                    }
                }
                
                return token;
            }
            
            // 主应用
            class WeightApp {
                constructor() {
                    this.user = null;
                    this.targets = generateAllTargets();
                    this.entries = {};
                    this.currentInput = '';
                    this.todayEntries = [];
                    this.view = 'login';
                    this.sync = new GitHubSync(APP.GITHUB_REPO);
                    
                    this.init();
                }
                
                async init() {
                    // 检查登录状态
                    const savedUser = localStorage.getItem(APP.STORAGE_KEY);
                    if (savedUser === APP.USERNAME) {
                        this.user = savedUser;
                        this.view = 'main';
                        
                        // 加载数据
                        await this.loadData();
                        
                        // 初始化今日录入
                        const todayStr = formatDate(new Date());
                        if (this.entries[todayStr]) {
                            this.todayEntries = [...this.entries[todayStr]];
                        } else {
                            this.todayEntries = [];
                        }
                    }
                    
                    this.render();
                }
                
                // 加载数据
                async loadData() {
                    this.entries = await this.sync.loadData();
                }
                
                // 保存数据到GitHub
                async saveToGitHub() {
                    // 准备要保存的数据（只保存录入值，不保存计算字段）
                    const saveData = {};
                    Object.keys(this.entries).forEach(key => {
                        if (!key.includes('_avg')) {
                            saveData[key] = this.entries[key];
                        }
                    });
                    
                    const result = await this.sync.saveData(saveData);
                    
                    // 更新UI中的同步状态
                    this.render();
                    
                    return result;
                }
                
                // 保存录入数据
                async saveEntries() {
                    // 保存到内存
                    localStorage.setItem(APP.DATA_KEY, JSON.stringify(this.entries));
                    
                    // 同步到GitHub
                    await this.saveToGitHub();
                }
                
                // 处理登录
                handleLogin(username) {
                    if (username.toLowerCase() === APP.USERNAME) {
                        this.user = APP.USERNAME;
                        localStorage.setItem(APP.STORAGE_KEY, APP.USERNAME);
                        this.view = 'main';
                        
                        // 初始化今日录入
                        const todayStr = formatDate(new Date());
                        if (this.entries[todayStr]) {
                            this.todayEntries = [...this.entries[todayStr]];
                        } else {
                            this.todayEntries = [];
                        }
                        
                        this.render();
                        return true;
                    }
                    return false;
                }
                
                // 登出
                handleLogout() {
                    this.user = null;
                    localStorage.removeItem(APP.STORAGE_KEY);
                    this.view = 'login';
                    this.render();
                }
                
                // 添加今日体重录入
                addTodayEntry(weight) {
                    const num = parseFloat(weight);
                    if (isNaN(num) || num < 30 || num > 200) return false;
                    
                    this.todayEntries.push(num);
                    this.render();
                    return true;
                }
                
                // 删除一条今日录入
                removeTodayEntry(index) {
                    this.todayEntries.splice(index, 1);
                    this.render();
                }
                
                // 保存今日平均体重
                async saveTodayWeight() {
                    if (this.todayEntries.length === 0) return;
                    
                    const avg = this.todayEntries.reduce((a, b) => a + b, 0) / this.todayEntries.length;
                    const todayStr = formatDate(new Date());
                    
                    this.entries[todayStr] = [...this.todayEntries];
                    this.entries[`${todayStr}_avg`] = Math.round(avg * 100) / 100;
                    
                    // 保存到GitHub
                    await this.saveEntries();
                    
                    // 刷新视图
                    this.render();
                }
                
                // 获取图表数据
                getChartData() {
                    const today = new Date();
                    const dates = getDateRange(today);
                    
                    return dates.map(date => {
                        const dateStr = formatDate(date);
                        const target = getTargetForDate(date, this.targets);
                        
                        let actual = null;
                        if (this.entries[`${dateStr}_avg`]) {
                            actual = this.entries[`${dateStr}_avg`];
                        } else if (this.entries[dateStr] && this.entries[dateStr].length > 0) {
                            const entries = this.entries[dateStr];
                            actual = entries.reduce((a, b) => a + b, 0) / entries.length;
                            actual = Math.round(actual * 100) / 100;
                        }
                        
                        return {
                            date,
                            dateStr,
                            displayDate: formatDisplayDate(date),
                            target: target,
                            actual: actual,
                            maxBarValue: 100
                        };
                    });
                }
                
                // 渲染
                render() {
                    const app = document.getElementById('app');
                    
                    if (this.view === 'login') {
                        app.innerHTML = this.renderLogin();
                        this.attachLoginEvents();
                    } else {
                        app.innerHTML = this.renderMain();
                        this.attachMainEvents();
                    }
                }
                
                // 渲染登录界面
                renderLogin() {
                    return `
                        <div class="login-container">
                            <div class="login-title">⏳ 体重日记</div>
                            <div class="login-subtitle">请输入用户名继续</div>
                            <input type="text" id="login-username" class="login-input" placeholder="用户名" autofocus>
                            <button id="login-btn" class="login-btn">登录</button>
                            <div id="login-error" class="login-error"></div>
                            
                            <div style="margin-top: 40px; font-size: 12px; color: #94a3b8;">
                                <p>首次使用需要设置GitHub Token</p>
                                <p>登录后会提示输入</p>
                            </div>
                        </div>
                    `;
                }
                
                // 渲染主界面
                renderMain() {
                    const chartData = this.getChartData();
                    const todayAvg = this.todayEntries.length > 0 
                        ? (this.todayEntries.reduce((a, b) => a + b, 0) / this.todayEntries.length).toFixed(2)
                        : '--';
                    
                    let currentWeight = APP.START_WEIGHT;
                    const todayStr = formatDate(new Date());
                    if (this.entries[`${todayStr}_avg`]) {
                        currentWeight = this.entries[`${todayStr}_avg`];
                    } else {
                        const dates = Object.keys(this.entries).filter(k => !k.includes('_avg')).sort().reverse();
                        for (let d of dates) {
                            if (d !== todayStr && this.entries[`${d}_avg`]) {
                                currentWeight = this.entries[`${d}_avg`];
                                break;
                            }
                        }
                    }
                    
                    const progress = calculateProgress(currentWeight);
                    
                    return `
                        <div>
                            <!-- 头部 -->
                            <div class="header">
                                <div class="user-info">
                                    <div class="user-avatar">P</div>
                                    <span class="user-name">${this.user}</span>
                                </div>
                                <button id="logout-btn" class="logout-btn">退出</button>
                            </div>
                            
                            <!-- 目标卡片 -->
                            <div class="target-card">
                                <div class="target-title">今日目标体重</div>
                                <div>
                                    <span class="target-value" id="today-target">${getTargetForDate(new Date(), this.targets)?.toFixed(1) || '--'}</span>
                                    <span class="target-unit">kg</span>
                                </div>
                                <div class="target-progress">
                                    <div class="progress-label">
                                        <span>目标进度</span>
                                        <span>${progress.toFixed(1)}%</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 6px;">
                                        <span>起始: ${APP.START_WEIGHT}kg</span>
                                        <span>目标: ${APP.TARGET_WEIGHT}kg</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 录入区域 -->
                            <div class="input-section">
                                <div class="section-title">
                                    <span>📝 今日录入</span>
                                </div>
                                <div class="today-weight-input">
                                    <input type="number" id="weight-input" class="weight-field" step="0.01" placeholder="输入体重" value="${this.currentInput}">
                                    <button id="add-weight-btn" class="add-btn">添加</button>
                                </div>
                                
                                <div class="today-entries" id="today-entries">
                                    ${this.todayEntries.map((w, i) => `
                                        <span class="entry-tag">
                                            ${w.toFixed(2)}kg
                                            <span class="remove" data-index="${i}">✕</span>
                                        </span>
                                    `).join('')}
                                </div>
                                
                                <div class="today-average">
                                    今日平均: <strong>${todayAvg}</strong> kg
                                </div>
                                
                                <button id="save-today-btn" class="save-btn" ${this.todayEntries.length === 0 ? 'disabled' : ''}>
                                    保存今日体重
                                </button>
                                
                                <!-- 同步状态 -->
                                <div id="sync-status" class="sync-status success">
                                    <span>✅</span>
                                    <span>数据已同步</span>
                                </div>
                                <div class="last-sync">
                                    ${this.sync.getLastSyncDisplay()}
                                </div>
                            </div>
                            
                            <!-- 图表区域 -->
                            <div class="chart-section">
                                <div class="legend">
                                    <div class="legend-item">
                                        <span class="legend-dot dot-red"></span>
                                        <span>实际体重</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="legend-dot dot-green"></span>
                                        <span>目标体重</span>
                                    </div>
                                </div>
                                
                                <div class="chart-container">
                                    <div class="chart-grid">
                                        ${chartData.map(item => {
                                            const maxWeight = 100;
                                            const targetHeight = item.target ? Math.min(120, (item.target / maxWeight) * 120) : 0;
                                            const actualHeight = item.actual ? Math.min(120, (item.actual / maxWeight) * 120) : 0;
                                            
                                            return `
                                                <div class="chart-column">
                                                    <div class="chart-bars">
                                                        ${item.actual ? `<div class="bar-red" style="height: ${actualHeight}px;"></div>` : ''}
                                                        ${item.target ? `<div class="bar-green" style="height: ${targetHeight}px;"></div>` : ''}
                                                    </div>
                                                    <div class="chart-date">${item.displayDate}</div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="footer-note">
                                💾 数据通过GitHub Actions自动保存到仓库
                            </div>
                        </div>
                    `;
                }
                
                // 绑定登录事件
                attachLoginEvents() {
                    const btn = document.getElementById('login-btn');
                    const input = document.getElementById('login-username');
                    const error = document.getElementById('login-error');
                    
                    if (btn) {
                        btn.addEventListener('click', () => {
                            const success = this.handleLogin(input.value.trim());
                            if (!success) {
                                error.textContent = '用户名无效，请输入 "percy"';
                            }
                        });
                    }
                    
                    if (input) {
                        input.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') {
                                const success = this.handleLogin(input.value.trim());
                                if (!success) {
                                    error.textContent = '用户名无效，请输入 "percy"';
                                }
                            }
                        });
                    }
                }
                
                // 绑定主界面事件
                attachMainEvents() {
                    // 登出
                    const logoutBtn = document.getElementById('logout-btn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', () => this.handleLogout());
                    }
                    
                    // 添加体重
                    const addBtn = document.getElementById('add-weight-btn');
                    const weightInput = document.getElementById('weight-input');
                    
                    if (addBtn && weightInput) {
                        addBtn.addEventListener('click', () => {
                            this.addTodayEntry(weightInput.value);
                            weightInput.value = '';
                        });
                        
                        weightInput.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') {
                                this.addTodayEntry(weightInput.value);
                                weightInput.value = '';
                            }
                        });
                    }
                    
                    // 删除今日录入
                    document.querySelectorAll('.entry-tag .remove').forEach(el => {
                        el.addEventListener('click', (e) => {
                            const index = e.target.getAttribute('data-index');
                            if (index !== null) {
                                this.removeTodayEntry(parseInt(index));
                            }
                            e.stopPropagation();
                        });
                    });
                    
                    // 保存今日
                    const saveBtn = document.getElementById('save-today-btn');
                    if (saveBtn) {
                        saveBtn.addEventListener('click', () => {
                            this.saveTodayWeight();
                        });
                    }
                }
            }
            
            // 启动应用
            window.addEventListener('DOMContentLoaded', () => {
                new WeightApp();
            });
        })();
    </script>
</body>
</html>

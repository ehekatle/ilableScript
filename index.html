<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Percy · 体重日记</title>
    <!-- 使用最简单的 CDN 引用，不添加 integrity 验证 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
            color: #1e293b;
        }

        #app {
            max-width: 400px;
            width: 100%;
        }

        /* 极简卡片设计 */
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            margin-bottom: 16px;
            border: 1px solid #f1f5f9;
        }

        /* 登录页 */
        .login-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-title {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #0f172a;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .login-input {
            width: 100%;
            padding: 18px;
            border: none;
            background: #f1f5f9;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .login-input:focus {
            background: #e6edf5;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            margin-top: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
        }

        /* 主界面头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .greeting {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        .greeting span {
            color: #3b82f6;
            font-weight: 600;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #f1f5f9;
        }

        /* 目标卡片 - 极简 */
        .target-section {
            margin-bottom: 20px;
        }

        .target-label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .target-value {
            font-size: 42px;
            font-weight: 600;
            color: #0f172a;
            line-height: 1;
            margin-bottom: 16px;
        }

        .target-unit {
            font-size: 16px;
            color: #94a3b8;
            font-weight: 400;
            margin-left: 6px;
        }

        /* 极简进度条 */
        .progress-container {
            margin: 16px 0 8px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        .target-range {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
        }

        /* 录入区域 - 极简 */
        .input-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 500;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .weight-input {
            flex: 1;
            padding: 16px;
            border: none;
            background: #f1f5f9;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .add-btn {
            width: 60px;
            height: 60px;
            border: none;
            background: #0f172a;
            color: white;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 400;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        /* 今日录入标签 */
        .entries-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .entry-tag {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 15px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remove-entry {
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: color 0.2s;
        }

        .remove-entry:hover {
            color: #ef4444;
        }

        .average-info {
            font-size: 14px;
            color: #64748b;
            margin: 16px 0;
            padding: 12px 0;
            border-top: 1px dashed #e2e8f0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .average-info strong {
            color: #0f172a;
            font-size: 20px;
            margin-left: 6px;
        }

        .save-btn {
            width: 100%;
            padding: 18px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #2563eb;
        }

        .save-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* 图表区域 */
        .chart-section {
            margin-top: 20px;
        }

        .chart-legend {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
        }

        .dot-red {
            background: #ef4444;
        }

        .dot-green {
            background: #10b981;
        }

        .chart-container {
            position: relative;
            height: 220px;
            width: 100%;
            margin-top: 8px;
        }

        /* 同步状态 */
        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #64748b;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .sync-status.syncing {
            color: #3b82f6;
        }

        .sync-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-top: 24px;
            letter-spacing: 0.2px;
        }

        /* 备用图表（当Chart.js加载失败时） */
        .fallback-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 180px;
            padding: 20px 0 10px;
            gap: 4px;
        }

        .fallbar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 20px;
        }

        .fallbar-bars {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 120px;
            justify-content: center;
        }

        .fallbar-red {
            width: 12px;
            background: #ef4444;
            border-radius: 4px 4px 0 0;
            transition: height 0.2s;
        }

        .fallbar-green {
            width: 12px;
            background: #10b981;
            border-radius: 4px 4px 0 0;
            transition: height 0.2s;
        }

        .fallbar-date {
            font-size: 10px;
            color: #64748b;
            transform: rotate(-45deg);
            white-space: nowrap;
        }

        .chart-error {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 13px;
        }

        .retry-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            margin-top: 10px;
        }

        .retry-btn:hover {
            background: #f1f5f9;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // 常量定义
            const APP = {
                USERNAME: 'percy',
                START_WEIGHT: 91.3,
                TARGET_WEIGHT: 73,
                STORAGE_KEY: 'weight_app_user',
                DATA_KEY: 'weight_app_data',
                GITHUB_REPO: '你的用户名/你的仓库名', // 请修改为你的仓库
                SYNC_STATUS_KEY: 'last_sync_time'
            };

            // 生成未来所有目标体重
            function generateAllTargets(startDate = new Date()) {
                const targets = [];
                let currentTarget = APP.START_WEIGHT;
                let currentDate = new Date(startDate);
                currentDate.setHours(0, 0, 0, 0);

                for (let i = 0; i < 365; i++) {
                    targets.push({
                        date: new Date(currentDate),
                        target: Number(currentTarget.toFixed(2))
                    });

                    const nextTarget = currentTarget - (currentTarget * 0.0007 + 0.13) / 2;
                    currentTarget = Math.max(nextTarget, APP.TARGET_WEIGHT);
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                return targets;
            }

            // 获取目标体重
            function getTargetForDate(date, targets) {
                const target = targets.find(t => 
                    t.date.toDateString() === date.toDateString()
                );
                return target ? target.target : null;
            }

            // 计算进度百分比
            function calculateProgress(currentWeight) {
                const total = APP.START_WEIGHT - APP.TARGET_WEIGHT;
                const progress = APP.START_WEIGHT - currentWeight;
                return Math.min(100, Math.max(0, (progress / total) * 100));
            }

            // 格式化日期
            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function formatDisplayDate(date) {
                return `${date.getMonth() + 1}/${date.getDate()}`;
            }

            // 获取最近11天的日期
            function getLast11Days() {
                const dates = [];
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                // 前9天
                for (let i = 9; i >= 1; i--) {
                    const d = new Date(today);
                    d.setDate(today.getDate() - i);
                    dates.push(d);
                }
                // 今天
                dates.push(new Date(today));
                // 明天
                const tomorrow = new Date(today);
                tomorrow.setDate(today.getDate() + 1);
                dates.push(tomorrow);
                
                return dates;
            }

            // GitHub 同步类
            class GitHubSync {
                constructor(repo) {
                    this.repo = repo;
                    this.syncInProgress = false;
                    this.lastSyncTime = localStorage.getItem(APP.SYNC_STATUS_KEY) || null;
                }

                async saveData(data) {
                    if (this.syncInProgress) return { success: false, message: '同步中' };

                    this.syncInProgress = true;
                    this.updateSyncStatus('syncing');

                    try {
                        let token = localStorage.getItem('github_token');
                        if (!token) {
                            token = prompt('请输入 GitHub Personal Access Token (需要 repo 权限)');
                            if (!token) throw new Error('需要 Token 才能同步');
                            if (confirm('保存 Token 到本地以便下次自动使用？')) {
                                localStorage.setItem('github_token', token);
                            }
                        }

                        const response = await fetch(`https://api.github.com/repos/${this.repo}/dispatches`, {
                            method: 'POST',
                            headers: {
                                'Accept': 'application/vnd.github.v3+json',
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                event_type: 'save-weight',
                                client_payload: data
                            })
                        });

                        if (!response.ok) throw new Error(`GitHub API 错误: ${response.status}`);

                        const now = new Date().toISOString();
                        localStorage.setItem(APP.SYNC_STATUS_KEY, now);
                        this.lastSyncTime = now;
                        localStorage.setItem(APP.DATA_KEY, JSON.stringify(data));

                        this.updateSyncStatus('success');
                        return { success: true };

                    } catch (error) {
                        console.error('同步失败:', error);
                        localStorage.setItem(APP.DATA_KEY, JSON.stringify(data));
                        this.updateSyncStatus('error');
                        return { success: false, message: error.message };
                    } finally {
                        this.syncInProgress = false;
                    }
                }

                async loadData() {
                    try {
                        const response = await fetch(`https://raw.githubusercontent.com/${this.repo}/main/data/weight-data.json?t=${Date.now()}`);
                        if (response.ok) {
                            const data = await response.json();
                            localStorage.setItem(APP.DATA_KEY, JSON.stringify(data));
                            return data;
                        }
                    } catch (e) {
                        console.log('使用本地数据');
                    }
                    
                    const local = localStorage.getItem(APP.DATA_KEY);
                    return local ? JSON.parse(local) : {};
                }

                updateSyncStatus(status) {
                    const statusEl = document.getElementById('sync-status');
                    if (!statusEl) return;

                    statusEl.className = `sync-status ${status}`;
                    if (status === 'syncing') {
                        statusEl.innerHTML = '<div class="sync-spinner"></div><span>同步中...</span>';
                    } else if (status === 'success') {
                        statusEl.innerHTML = '<span>✓</span><span>已同步</span>';
                    } else if (status === 'error') {
                        statusEl.innerHTML = '<span>⚠</span><span>同步失败</span>';
                    }
                }
            }

            // 主应用
            class WeightApp {
                constructor() {
                    this.user = null;
                    this.targets = generateAllTargets();
                    this.entries = {};
                    this.todayEntries = [];
                    this.view = 'login';
                    this.sync = new GitHubSync(APP.GITHUB_REPO);
                    this.chart = null;
                    this.chartJsAvailable = typeof Chart !== 'undefined';
                    
                    this.init();
                }

                async init() {
                    const savedUser = localStorage.getItem(APP.STORAGE_KEY);
                    if (savedUser === APP.USERNAME) {
                        this.user = savedUser;
                        this.view = 'main';
                        await this.loadData();
                        
                        const todayStr = formatDate(new Date());
                        if (this.entries[todayStr]) {
                            this.todayEntries = [...this.entries[todayStr]];
                        }
                    }
                    
                    this.render();
                }

                async loadData() {
                    this.entries = await this.sync.loadData();
                }

                handleLogin(username) {
                    if (username.toLowerCase() === APP.USERNAME) {
                        this.user = APP.USERNAME;
                        localStorage.setItem(APP.STORAGE_KEY, APP.USERNAME);
                        this.view = 'main';
                        
                        const todayStr = formatDate(new Date());
                        if (this.entries[todayStr]) {
                            this.todayEntries = [...this.entries[todayStr]];
                        }
                        
                        this.render();
                        return true;
                    }
                    return false;
                }

                handleLogout() {
                    this.user = null;
                    localStorage.removeItem(APP.STORAGE_KEY);
                    this.view = 'login';
                    this.render();
                }

                addTodayEntry(weight) {
                    const num = parseFloat(weight);
                    if (isNaN(num) || num < 30 || num > 200) return false;
                    this.todayEntries.push(num);
                    this.render();
                    return true;
                }

                removeTodayEntry(index) {
                    this.todayEntries.splice(index, 1);
                    this.render();
                }

                async saveTodayWeight() {
                    if (this.todayEntries.length === 0) return;

                    const avg = this.todayEntries.reduce((a, b) => a + b, 0) / this.todayEntries.length;
                    const todayStr = formatDate(new Date());

                    this.entries[todayStr] = [...this.todayEntries];
                    this.entries[`${todayStr}_avg`] = Math.round(avg * 100) / 100;

                    await this.sync.saveData(this.entries);
                    this.render();
                }

                // 获取图表数据
                getChartData() {
                    const dates = getLast11Days();
                    return dates.map(date => {
                        const dateStr = formatDate(date);
                        const target = getTargetForDate(date, this.targets);
                        
                        let actual = null;
                        if (this.entries[`${dateStr}_avg`]) {
                            actual = this.entries[`${dateStr}_avg`];
                        } else if (this.entries[dateStr]?.length) {
                            const entries = this.entries[dateStr];
                            actual = entries.reduce((a, b) => a + b, 0) / entries.length;
                            actual = Math.round(actual * 100) / 100;
                        }
                        
                        return {
                            date,
                            displayDate: formatDisplayDate(date),
                            target: target,
                            actual: actual
                        };
                    });
                }

                // 渲染备用柱状图
                renderFallbackChart() {
                    const container = document.getElementById('fallback-chart-container');
                    if (!container) return;

                    const chartData = this.getChartData();
                    const maxWeight = 100; // 缩放基准

                    container.innerHTML = chartData.map(item => {
                        const targetHeight = item.target ? Math.min(100, (item.target / maxWeight) * 100) : 0;
                        const actualHeight = item.actual ? Math.min(100, (item.actual / maxWeight) * 100) : 0;
                        
                        return `
                            <div class="fallbar">
                                <div class="fallbar-bars">
                                    ${item.actual ? `<div class="fallbar-red" style="height: ${actualHeight}px;" title="${item.actual}kg"></div>` : ''}
                                    ${item.target ? `<div class="fallbar-green" style="height: ${targetHeight}px;" title="${item.target}kg"></div>` : ''}
                                </div>
                                <div class="fallbar-date">${item.displayDate}</div>
                            </div>
                        `;
                    }).join('');
                }

                // 使用 Chart.js 渲染图表
                renderChart() {
                    if (typeof Chart === 'undefined') {
                        this.renderFallbackChart();
                        return;
                    }

                    try {
                        if (this.chart) {
                            this.chart.destroy();
                        }

                        const ctx = document.getElementById('weight-chart');
                        if (!ctx) return;

                        const chartData = this.getChartData();
                        const labels = chartData.map(d => d.displayDate);
                        const actualData = chartData.map(d => d.actual);
                        const targetData = chartData.map(d => d.target);

                        // 找到有效的体重范围
                        const allValues = [...targetData, ...actualData.filter(v => v !== null)];
                        const minWeight = Math.floor((Math.min(65, ...allValues) - 2) / 5) * 5;
                        const maxWeight = Math.ceil((Math.max(APP.START_WEIGHT + 1, ...allValues) + 2) / 5) * 5;

                        this.chart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [
                                    {
                                        label: '实际体重',
                                        data: actualData,
                                        borderColor: '#ef4444',
                                        backgroundColor: 'transparent',
                                        tension: 0.3,
                                        pointRadius: 4,
                                        pointHoverRadius: 6,
                                        pointBackgroundColor: '#ef4444',
                                        borderWidth: 2,
                                        spanGaps: true,
                                    },
                                    {
                                        label: '目标体重',
                                        data: targetData,
                                        borderColor: '#10b981',
                                        backgroundColor: 'transparent',
                                        tension: 0.3,
                                        pointRadius: 4,
                                        pointHoverRadius: 6,
                                        pointBackgroundColor: '#10b981',
                                        borderWidth: 2,
                                        borderDash: [5, 3],
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        display: false
                                    },
                                    tooltip: {
                                        backgroundColor: '#0f172a',
                                        titleColor: '#f8fafc',
                                        bodyColor: '#cbd5e1',
                                        padding: 12,
                                        cornerRadius: 16,
                                        displayColors: false,
                                        callbacks: {
                                            label: (context) => {
                                                const value = context.raw;
                                                return value ? `${value.toFixed(1)} kg` : '未录入';
                                            }
                                        }
                                    }
                                },
                                scales: {
                                    y: {
                                        beginAtZero: false,
                                        min: minWeight,
                                        max: maxWeight,
                                        grid: {
                                            color: '#f1f5f9',
                                            drawBorder: false,
                                        },
                                        ticks: {
                                            stepSize: 5,
                                            color: '#94a3b8',
                                            font: {
                                                size: 11
                                            }
                                        }
                                    },
                                    x: {
                                        grid: {
                                            display: false
                                        },
                                        ticks: {
                                            color: '#64748b',
                                            font: {
                                                size: 11
                                            },
                                            maxRotation: 45,
                                            minRotation: 45
                                        }
                                    }
                                }
                            }
                        });
                    } catch (e) {
                        console.error('图表渲染失败，使用备用视图', e);
                        this.renderFallbackChart();
                    }
                }

                render() {
                    const app = document.getElementById('app');
                    
                    if (this.view === 'login') {
                        app.innerHTML = this.renderLogin();
                        this.attachLoginEvents();
                    } else {
                        app.innerHTML = this.renderMain();
                        this.attachMainEvents();
                        // 等待DOM更新后再渲染图表
                        setTimeout(() => {
                            if (typeof Chart !== 'undefined') {
                                this.renderChart();
                            } else {
                                this.renderFallbackChart();
                            }
                        }, 100);
                    }
                }

                renderLogin() {
                    return `
                        <div class="login-container">
                            <div class="login-title">体重日记</div>
                            <div class="login-subtitle">percy 的私人记录</div>
                            <input type="text" id="login-username" class="login-input" placeholder="输入用户名" autofocus>
                            <button id="login-btn" class="login-btn">开始</button>
                            <div id="login-error" class="login-error"></div>
                        </div>
                    `;
                }

                renderMain() {
                    const todayTarget = getTargetForDate(new Date(), this.targets);
                    const todayAvg = this.todayEntries.length > 0 
                        ? (this.todayEntries.reduce((a, b) => a + b, 0) / this.todayEntries.length).toFixed(2)
                        : '--';

                    // 计算当前体重（用于进度条）
                    let currentWeight = APP.START_WEIGHT;
                    const todayStr = formatDate(new Date());
                    if (this.entries[`${todayStr}_avg`]) {
                        currentWeight = this.entries[`${todayStr}_avg`];
                    } else {
                        const dates = Object.keys(this.entries).filter(k => !k.includes('_avg')).sort().reverse();
                        for (let d of dates) {
                            if (d !== todayStr && this.entries[`${d}_avg`]) {
                                currentWeight = this.entries[`${d}_avg`];
                                break;
                            }
                        }
                    }

                    const progress = calculateProgress(currentWeight);

                    return `
                        <div>
                            <div class="header">
                                <div class="greeting">你好, <span>percy</span></div>
                                <button id="logout-btn" class="logout-btn">退出</button>
                            </div>

                            <div class="card">
                                <div class="target-section">
                                    <div class="target-label">今日目标</div>
                                    <div class="target-value">
                                        ${todayTarget?.toFixed(1)}<span class="target-unit">kg</span>
                                    </div>
                                    
                                    <div class="progress-container">
                                        <div class="progress-stats">
                                            <span>进度</span>
                                            <span>${progress.toFixed(1)}%</span>
                                        </div>
                                        <div class="progress-bar-bg">
                                            <div class="progress-bar-fill" style="width: ${progress}%"></div>
                                        </div>
                                        <div class="target-range">
                                            <span>${APP.START_WEIGHT} kg</span>
                                            <span>${APP.TARGET_WEIGHT} kg</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card">
                                <div class="section-title">今日录入</div>
                                
                                <div class="input-row">
                                    <input type="number" id="weight-input" class="weight-input" step="0.01" placeholder="体重" autocomplete="off">
                                    <button id="add-weight-btn" class="add-btn">+</button>
                                </div>

                                <div class="entries-list" id="entries-list">
                                    ${this.todayEntries.map((w, i) => `
                                        <span class="entry-tag">
                                            ${w.toFixed(2)} kg
                                            <span class="remove-entry" data-index="${i}">×</span>
                                        </span>
                                    `).join('')}
                                </div>

                                <div class="average-info">
                                    今日平均 <strong>${todayAvg}</strong> kg
                                </div>

                                <button id="save-today-btn" class="save-btn" ${this.todayEntries.length === 0 ? 'disabled' : ''}>
                                    保存记录
                                </button>

                                <div id="sync-status" class="sync-status success">
                                    <span>✓</span><span>已同步</span>
                                </div>
                            </div>

                            <div class="card" style="padding-bottom: 16px;">
                                <div class="section-title">体重变化</div>
                                
                                <div class="chart-legend">
                                    <div class="legend-item">
                                        <span class="legend-dot dot-red"></span>
                                        <span>实际</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="legend-dot dot-green"></span>
                                        <span>目标</span>
                                    </div>
                                </div>

                                <div class="chart-container">
                                    ${typeof Chart !== 'undefined' 
                                        ? '<canvas id="weight-chart"></canvas>' 
                                        : '<div id="fallback-chart-container" class="fallback-chart"></div>'
                                    }
                                </div>
                                
                                ${typeof Chart === 'undefined' ? `
                                    <div class="chart-error">
                                        <p>使用备用柱状图显示</p>
                                        <button class="retry-btn" onclick="location.reload()">重试加载图表</button>
                                    </div>
                                ` : ''}
                            </div>

                            <div class="footer">
                                ${this.sync.lastSyncTime 
                                    ? `上次同步 ${new Date(this.sync.lastSyncTime).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}` 
                                    : '等待同步'}
                            </div>
                        </div>
                    `;
                }

                attachLoginEvents() {
                    const btn = document.getElementById('login-btn');
                    const input = document.getElementById('login-username');
                    const error = document.getElementById('login-error');

                    const tryLogin = () => {
                        const success = this.handleLogin(input.value.trim());
                        if (!success) {
                            error.textContent = '用户名无效';
                        }
                    };

                    if (btn) btn.addEventListener('click', tryLogin);
                    if (input) {
                        input.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') tryLogin();
                        });
                    }
                }

                attachMainEvents() {
                    document.getElementById('logout-btn')?.addEventListener('click', () => this.handleLogout());

                    const addBtn = document.getElementById('add-weight-btn');
                    const weightInput = document.getElementById('weight-input');

                    if (addBtn && weightInput) {
                        const addWeight = () => {
                            this.addTodayEntry(weightInput.value);
                            weightInput.value = '';
                        };

                        addBtn.addEventListener('click', addWeight);
                        weightInput.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') addWeight();
                        });
                    }

                    document.querySelectorAll('.remove-entry').forEach(el => {
                        el.addEventListener('click', (e) => {
                            const index = e.target.getAttribute('data-index');
                            if (index !== null) {
                                this.removeTodayEntry(parseInt(index));
                            }
                        });
                    });

                    document.getElementById('save-today-btn')?.addEventListener('click', () => {
                        this.saveTodayWeight();
                    });
                }
            }

            // 启动应用
            window.addEventListener('DOMContentLoaded', () => {
                new WeightApp();
            });
        })();
    </script>
</body>
</html>
